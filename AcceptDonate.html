<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShadowGrid | Оплата</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Фон -->
  <div class="pixel-bg"></div>
  <div class="overlay"></div>

  <!-- Шапка -->
  <header class="header">
    <div class="logo-box">
      <div class="logo-icon">🪙</div>
      <div>
        <h1>ShadowGrid</h1>
        <p>Підтвердження оплати</p>
      </div>
    </div>

    <!-- Меню -->
    <nav class="nav">
      <a href="index.html">Головна</a>
      <a href="Donate.html">Донат</a>
      <a href="Teh.html">Техпідтримка</a>
    </nav>
  </header>

  <main class="container">
    <!-- Два блока: инфо + QR -->
    <section class="pay-grid">
      <!-- Левая часть -->
      <div class="panel">
        <span class="badge">✅ PAYMENT</span>
        <h2>Підтвердження покупки</h2>
        <p>Обраний донат:</p>

        <!-- Название доната подставляется из ссылки -->
        <h3 id="selected-rank" class="selected-rank">Shadow Lord</h3>

        <!-- Инструкция -->
        <ul class="pay-list">
          <li>1. Відскануй QR-код</li>
          <li>2. Оплати потрібну суму</li>
          <li>3. Надішли чек адміністрації</li>
          <li>4. Вкажи свій нік на сервері</li>
        </ul>

        <!-- Кнопки -->
        <div class="hero-buttons">
          <a class="btn btn-red" href="Donate.html">Назад</a>
          <a class="btn btn-dark" href="Teh.html">Підтримка</a>
        </div>
      </div>

      <!-- Правая часть -->
      <div class="panel qr-panel">
        <h3>QR для оплати</h3>

        <!-- Блок для QR -->
        <div class="qr-wrap">
          <!-- МЕНЯТЬ QR ЗДЕСЬ -->
          <img src="img/qr.png" alt="QR оплати" class="qr-image">
        </div>

        <p>Скануй код для оплати.</p>
      </div>
    </section>
  </main>

  <!-- Экран перехода -->
  <div id="page-transition"></div>

  <script src="script.js"></script>
</body>

</html>
