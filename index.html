<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BroBank Dark</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #000000;
    --card: #121212;
    --card-light: #1c1c1e;
    --accent: #ff3b30; /* Monobank Red / Error */
    --primary: #ffffff;
    --secondary: #8e8e93;
    --green: #34c759;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background: var(--bg); color: var(--primary); min-height: 100vh; overflow-x: hidden; }

/* AUTH */
#auth { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
.abox { width: 100%; max-width: 360px; padding: 20px; text-align: center; }
.logo-circle { width: 80px; height: 80px; background: var(--card-light); border-radius: 20px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; }

/* APP */
#app { display: none; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sb { background: var(--bg); border-right: 1px solid #2c2c2e; padding: 20px; display: flex; flex-direction: column; }
.nav-it { padding: 12px 15px; border-radius: 12px; cursor: pointer; color: var(--secondary); transition: 0.2s; margin-bottom: 5px; font-weight: 500; }
.nav-it:hover, .nav-it.on { background: var(--card-light); color: #fff; }

.main { padding: 30px; background: var(--bg); overflow-y: auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

/* CARDS */
.card-stack { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.m-card { background: var(--card-light); border-radius: 20px; padding: 25px; height: 180px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #2c2c2e; position: relative; overflow: hidden; }
.m-card.blocked { filter: grayscale(1); opacity: 0.6; }
.m-card.blocked::after { content: 'ЗАБЛОКИРОВАНО'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); color: var(--accent); font-weight: 900; border: 2px solid var(--accent); padding: 5px; }

/* CLICKER */
.click-box { background: var(--card); border-radius: 30px; padding: 50px; text-align: center; border: 1px solid #2c2c2e; }
.coin { width: 150px; height: 150px; background: linear-gradient(145deg, #1e1e1e, #121212); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 60px; cursor: pointer; transition: 0.1s; border: 4px solid #2c2c2e; }
.coin:active { transform: scale(0.95); }

/* UI ELEMENTS */
.btn { background: var(--primary); color: #000; border: none; padding: 12px 20px; border-radius: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%; }
.btn:hover { opacity: 0.9; }
.btn-dark { background: var(--card-light); color: #fff; border: 1px solid #2c2c2e; }
.input { width: 100%; background: var(--card-light); border: 1px solid #2c2c2e; padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 10px; font-size: 15px; }
.badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
.bg-red { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #fff; color: #000; padding: 12px 24px; border-radius: 20px; font-weight: 600; transition: 0.3s; z-index: 1000; }
.toast.show { transform: translateX(-50%) translateY(0); }

.page { display: none; } .page.on { display: block; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="auth">
    <div class="abox">
        <div class="logo-circle">🏦</div>
        <h2 style="margin-bottom: 10px;">BroBank</h2>
        <p style="color: var(--secondary); margin-bottom: 25px;">Вход в личный кабинет</p>
        <div id="authForms">
            <input id="login" class="input" placeholder="Логин">
            <input id="pass" class="input" type="password" placeholder="Пароль">
            <button class="btn" onclick="handleAuth('login')">Войти</button>
            <p style="margin-top: 15px; font-size: 14px; color: var(--secondary); cursor: pointer;" onclick="toggleAuth()">У меня нет аккаунта</p>
        </div>
    </div>
</div>

<div id="app">
    <div class="sb">
        <div style="font-weight: 700; font-size: 20px; margin-bottom: 30px; padding-left: 10px;">BroBank.</div>
        <div class="nav">
            <div class="nav-it on" onclick="pg('dash')">Главная</div>
            <div class="nav-it" onclick="pg('click')">Заработать</div>
            <div class="nav-it" onclick="pg('shop')">Магазин</div>
            <div class="nav-it" onclick="pg('assets')">Имущество</div>
            <div class="nav-it" id="finesMenu" onclick="pg('fines')">Штрафы <span id="fineBadge" style="color:var(--accent); display:none;">•</span></div>
            <div id="admMenu" class="nav-it" style="display:none; color: var(--accent);" onclick="pg('adm')">Управление</div>
        </div>
        <div style="margin-top: auto; padding: 10px;">
            <div id="userName" style="font-size: 14px; font-weight: 600;">...</div>
            <div id="userStatus" style="font-size: 12px; color: var(--secondary);">Клиент</div>
        </div>
    </div>

    <div class="main">
        <div class="page on" id="p-dash">
            <div class="header"><h2>Ваши счета</h2> <button class="btn btn-dark" style="width: auto;" onclick="openCard()">+ Открыть карту</button></div>
            <div class="card-stack" id="cardsBox"></div>
            
            <h2 style="margin: 40px 0 20px;">Перевод</h2>
            <div style="max-width: 400px; background: var(--card); padding: 20px; border-radius: 20px;">
                <input id="trNum" class="input" placeholder="Номер карты">
                <input id="trAmt" class="input" type="number" placeholder="Сумма">
                <button class="btn" onclick="transfer()">Перевести</button>
            </div>
        </div>

        <div class="page" id="p-click">
            <div class="click-box">
                <div class="coin" onclick="mine()">🪙</div>
                <h1 id="userBal">0.00 ₴</h1>
                <p style="color: var(--secondary);">Нажимайте для заработка</p>
            </div>
            <h2 style="margin-top: 30px;">Улучшения</h2>
            <div class="card-stack" id="upgBox" style="margin-top: 15px;"></div>
        </div>

        <div class="page" id="p-shop">
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <button class="btn btn-dark" onclick="renderShop('house')">🏠 Дома</button>
                <button class="btn btn-dark" onclick="renderShop('car')">🏎️ Машины</button>
                <button class="btn btn-dark" onclick="renderShop('biz')">🏪 Бизнес</button>
            </div>
            <div class="card-stack" id="shopBox"></div>
        </div>

        <div class="page" id="p-assets">
            <div class="header"><h2>Ваше имущество</h2></div>
            <div class="card-stack" id="assetsBox"></div>
        </div>

        <div class="page" id="p-fines">
            <div class="header"><h2>Штрафы</h2></div>
            <div id="finesBox" class="card-stack"></div>
        </div>

        <div class="page" id="p-adm">
            <div class="header"><h2>Панель администратора</h2></div>
            <div class="card-stack">
                <div class="m-card" style="height: auto;">
                    <h3>Деньги и Штрафы</h3>
                    <input id="adLogin" class="input" placeholder="Логин игрока" style="margin-top:10px;">
                    <input id="adAmt" class="f-input input" type="number" placeholder="Сумма">
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" onclick="adAction('give')">Выдать</button>
                        <button class="btn bg-red" style="color:#fff;" onclick="adAction('fine')">Штраф</button>
                    </div>
                </div>
                <div class="m-card" style="height: auto;">
                    <h3>Блокировки</h3>
                    <input id="adCard" class="input" placeholder="Номер карты или Логин" style="margin-top:10px;">
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-dark" onclick="adAction('unblock')">Разблок. карту</button>
                        <button class="btn bg-red" style="color:#fff;" onclick="adAction('ban')">БАН Игрока</button>
                    </div>
                    <button class="btn btn-dark" style="margin-top:10px;" onclick="adAction('unban')">Разбанить игрока</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('bro_db')) || { users: {}, cards: {} };
let currentUser = null;
let isReg = false;

function save() { localStorage.setItem('bro_db', JSON.stringify(db)); }

function toast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function toggleAuth() {
    isReg = !isReg;
    const box = document.getElementById('authForms');
    if(isReg) {
        box.innerHTML = `
            <input id="rName" class="input" placeholder="Имя">
            <input id="login" class="input" placeholder="Придумайте логин">
            <input id="pass" class="input" type="password" placeholder="Пароль">
            <input id="admKey" class="input" type="password" placeholder="Ключ админа (опция)">
            <button class="btn" onclick="handleAuth('reg')">Зарегистрироваться</button>
            <p style="margin-top: 15px; font-size: 14px; color: var(--secondary); cursor: pointer;" onclick="toggleAuth()">Уже есть аккаунт</p>
        `;
    } else {
        location.reload();
    }
}

function handleAuth(type) {
    const l = document.getElementById('login').value.trim().toLowerCase();
    const p = document.getElementById('pass').value;

    if(type === 'reg') {
        const n = document.getElementById('rName').value;
        const ak = document.getElementById('admKey').value;
        if(db.users[l]) return toast("Логин занят");
        const cardNum = "4441" + Math.floor(100000000000 + Math.random() * 899999999999);
        db.users[l] = {
            name: n, pass: p, login: l, 
            isAdmin: ak === "admin2024",
            isBanned: false,
            cards: [{num: cardNum, bal: 100, isBlocked: false}],
            fines: [],
            blockCount: 0,
            mining: 0.01,
            assets: []
        };
        db.cards[cardNum] = l;
        save();
        toast("Аккаунт создан!");
        location.reload();
    } else {
        const u = db.users[l];
        if(!u || u.pass !== p) return toast("Неверные данные");
        if(u.isBanned) return toast("ВАШ АККАУНТ ЗАБАНЕН НАВСЕГДА");
        currentUser = u;
        startApp();
    }
}

function pg(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.nav-it').forEach(n => n.classList.remove('on'));
    document.getElementById('p-'+id).classList.add('on');
    event.currentTarget.classList.add('on');
}

function startApp() {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'grid';
    document.getElementById('userName').innerText = currentUser.name;
    if(currentUser.isAdmin) {
        document.getElementById('admMenu').style.display = 'block';
        document.getElementById('userStatus').innerText = "Администратор";
    }

    setInterval(() => {
        let pInc = 0;
        currentUser.assets.forEach(a => { if(a.inc) pInc += a.inc / 3600; });
        if(pInc > 0) { currentUser.cards[0].bal += pInc; upd(); }
    }, 1000);

    upd();
}

function upd() {
    const box = document.getElementById('cardsBox');
    box.innerHTML = currentUser.cards.map(c => `
        <div class="m-card ${c.isBlocked ? 'blocked' : ''}" onclick="copy('${c.num}')">
            <div>
                <div style="font-size: 12px; color: var(--secondary); margin-bottom: 5px;">Карта BroBank</div>
                <div style="font-size: 24px; font-weight: 700;">${c.bal.toFixed(2)} ₴</div>
            </div>
            <div style="font-family: monospace; letter-spacing: 2px;">${c.num.match(/.{1,4}/g).join(' ')}</div>
        </div>
    `).join('');

    document.getElementById('userBal').innerText = currentUser.cards[0].bal.toFixed(2) + " ₴";
    
    // Штрафы
    const fBox = document.getElementById('finesBox');
    fBox.innerHTML = currentUser.fines.map((f, i) => `
        <div class="m-card" style="height: auto;">
            <div class="badge bg-red" style="margin-bottom: 10px;">ШТРАФ</div>
            <h3>${f.amt} ₴</h3>
            <p style="font-size: 13px; color: var(--secondary); margin: 5px 0;">${f.reason}</p>
            <button class="btn" style="margin-top: 10px;" onclick="payFine(${i})">Оплатить</button>
        </div>
    `).join('');
    
    document.getElementById('fineBadge').style.display = currentUser.fines.length ? 'inline' : 'none';

    // Имущество
    document.getElementById('assetsBox').innerHTML = currentUser.assets.map(a => `
        <div class="m-card" style="height: auto;">
            <div style="font-size: 24px; margin-bottom: 10px;">${a.type === 'car' ? '🏎️' : a.type === 'house' ? '🏠' : '🏪'}</div>
            <h3>${a.name}</h3>
            ${a.inc ? `<p style="color: var(--green); font-size: 13px;">+${a.inc} ₴/час</p>` : ''}
        </div>
    `).join('');

    save();
}

function mine() {
    if(currentUser.cards[0].isBlocked) return toast("Карта заблокирована!");
    currentUser.cards[0].bal += currentUser.mining;
    upd();
}

function copy(n) { navigator.clipboard.writeText(n); toast("Номер скопирован"); }

function payFine(i) {
    const f = currentUser.fines[i];
    if(currentUser.cards[0].bal < f.amt) return toast("Недостаточно денег");
    currentUser.cards[0].bal -= f.amt;
    currentUser.fines.splice(i, 1);
    upd();
    toast("Штраф оплачен");
}

const shopItems = {
    house: [{n: "Квартира", p: 50000}, {n: "Дом", p: 250000}],
    car: [{n: "Lanos", p: 5000}, {n: "BMW M5", p: 150000}],
    biz: [{n: "Киоск", p: 20000, i: 1000}, {n: "Заправка", p: 500000, i: 30000}]
};

function renderShop(t) {
    document.getElementById('shopBox').innerHTML = shopItems[t].map(item => `
        <div class="m-card" style="height: auto;">
            <h3>${item.n}</h3>
            <p style="color: var(--secondary);">${item.i ? 'Доход: '+item.i+' ₴/ч' : 'Собственность'}</p>
            <button class="btn" style="margin-top: 15px;" onclick="buy('${t}','${item.n}',${item.p},${item.i||0})">${item.p} ₴</button>
        </div>
    `).join('');
}

function buy(type, name, price, inc) {
    if(currentUser.cards[0].bal < price) return toast("Мало денег");
    currentUser.cards[0].bal -= price;
    currentUser.assets.push({type, name, inc});
    upd(); toast("Куплено!");
}

function transfer() {
    const num = document.getElementById('trNum').value.trim();
    const amt = parseFloat(document.getElementById('trAmt').value);
    const targetL = db.cards[num];
    if(!targetL || currentUser.cards[0].bal < amt || currentUser.cards[0].isBlocked) return toast("Ошибка перевода");
    
    currentUser.cards[0].bal -= amt;
    const targetU = db.users[targetL];
    const targetC = targetU.cards.find(c => c.num === num);
    targetC.bal += amt;
    upd(); toast("Переведено!");
}

// АДМИНКА
function adAction(act) {
    const log = document.getElementById('adLogin').value.trim().toLowerCase();
    const amt = parseFloat(document.getElementById('adAmt').value);
    const cardInput = document.getElementById('adCard').value.trim();

    const u = db.users[log];

    if(act === 'give' && u) {
        u.cards[0].bal += amt;
        toast("Деньги выданы");
    } else if(act === 'fine' && u) {
        u.fines.push({amt, reason: "Штраф от администрации"});
        // Эмуляция блокировки если штраф большой или админ решил
        u.cards[0].isBlocked = true;
        u.blockCount++;
        if(u.blockCount >= 5) u.isBanned = true;
        toast("Штраф выписан, карта блок.");
    } else if(act === 'unblock') {
        // Ищем карту по номеру
        const ownerL = db.cards[cardInput];
        if(ownerL) {
            db.users[ownerL].cards.find(c => c.num === cardInput).isBlocked = false;
            toast("Карта разблокирована");
        }
    } else if(act === 'ban' && u) {
        u.isBanned = true;
        toast("ИГРОК ЗАБАНЕН");
    } else if(act === 'unban' && u) {
        u.isBanned = false;
        toast("Игрок разбанен");
    }
    save();
}

</script>
</body>
</html>
