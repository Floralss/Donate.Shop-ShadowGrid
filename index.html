<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magniy OS v10 Empire</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #050505; --card: #121214; --accent: #007AFF; --text: #fff; --sec: #8E8E93; --gold: #FFD700; --danger: #FF3B30; --success: #34C759; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Ban Screen */
        #ban-screen { position: fixed; inset: 0; background: rgba(255,0,0,0.9); z-index: 99999; display: none; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(10px); }

        /* Layout */
        .nav { display: flex; background: #000; border-bottom: 1px solid #222; overflow-x: auto; scrollbar-width: none; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: var(--sec); white-space: nowrap; font-weight: 600; font-size: 13px; }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .main { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }

        /* Cards & Shop */
        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 15px; border: 1px solid #222; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .shop-item { background: #1c1c1e; padding: 12px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .shop-item b { display: block; margin-bottom: 5px; font-size: 14px; }
        .shop-item span { color: var(--gold); font-size: 12px; }

        /* Buttons */
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 8px; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-red { background: var(--danger); color: #fff; }
        .input { width: 100%; background: #1c1c1e; border: 1px solid #2c2c2e; padding: 12px; border-radius: 12px; color: #fff; margin-bottom: 10px; outline: none; }

        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .page { display: none; } .page.active { display: block; }
    </style>
</head>
<body>

<div id="ban-screen">
    <div>
        <h1 style="font-size: 50px;">🚫 ВЫ ЗАБАНЕНЫ</h1>
        <p>Ваш доступ к Magniy OS ограничен администрацией.</p>
    </div>
</div>

<div id="auth-screen">
    <div style="width: 100%; max-width: 320px; text-align: center;">
        <h1 style="margin-bottom: 20px;">MAGNIY EMPIRE</h1>
        <input id="l-in" class="input" placeholder="Логин">
        <input id="p-in" class="input" type="password" placeholder="Пароль">
        <button class="btn btn-blue" onclick="auth()">ВОЙТИ / РЕГИСТРАЦИЯ</button>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="sw('dash', this)">🏠 Главная</div>
    <div class="nav-item" onclick="sw('shop', this)">🛒 Магазин</div>
    <div class="nav-item" onclick="sw('inv', this)">📦 Имущество</div>
    <div class="nav-item" onclick="sw('bank', this)">💳 Банк</div>
    <div id="adm-link" class="nav-item" style="color:red; display:none;" onclick="sw('adm', this)">🛠 Админ</div>
    <div class="nav-item" onclick="exit()">🚪 Выход</div>
</div>

<div class="main">
    <div id="p-dash" class="page active">
        <div class="card" style="text-align: center;">
            <p style="color: var(--sec);">Общий баланс</p>
            <h1 id="b-uah">0 ₴</h1>
            <div style="display: flex; justify-content: space-around; margin-top: 10px;">
                <span>$ <b id="b-usd">0</b></span>
                <span>€ <b id="b-eur">0</b></span>
            </div>
            <button class="btn btn-blue" onclick="work()" style="margin-top: 20px;">💰 РАБОТАТЬ (+20 ₴)</button>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h3>🚗 Автосалон</h3>
        <div class="shop-grid" id="shop-cars"></div><br>
        <h3>🏠 Недвижимость</h3>
        <div class="shop-grid" id="shop-houses"></div><br>
        <h3>💼 Бизнесы</h3>
        <div class="shop-grid" id="shop-biz"></div>
    </div>

    <div id="p-inv" class="page">
        <h3>Мои вещи</h3><br>
        <div id="inventory-list"></div>
    </div>

    <div id="p-bank" class="page">
        <div class="card">
            <h3>Обменник</h3><br>
            <input id="ex-val" class="input" type="number" placeholder="Сумма в ₴">
            <button class="btn btn-blue" onclick="exchange('usd')">Купить $ (40₴)</button>
            <button class="btn btn-blue" onclick="exchange('eur')">Купить € (45₴)</button>
        </div>
    </div>

    <div id="p-adm" class="page">
        <div class="card">
            <h3>Управление игроками</h3><br>
            <input id="a-user" class="input" placeholder="Логин игрока">
            <input id="a-sum" class="input" type="number" placeholder="Сумма">
            <button class="btn btn-blue" onclick="admDo('give')">Выдать ₴</button>
            <button class="btn btn-red" onclick="admDo('ban')">ЗАБАНИТЬ</button>
            <button class="btn btn-blue" style="background:var(--success)" onclick="admDo('unban')">РАЗБАНИТЬ</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDmf-lcDM5hXBwBqzymGlzdoHdTGfT2pRg",
    authDomain: "magniybank.firebaseapp.com",
    databaseURL: "https://magniybank-default-rtdb.firebaseio.com",
    projectId: "magniybank",
    storageBucket: "magniybank.firebasestorage.app",
    messagingSenderId: "1006815080708",
    appId: "1:1006815080708:web:e9c3afd0a15d8abbe46051"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let user = localStorage.getItem('mag_emp_u');
let uData = null;

const items = {
    cars: [{n:"Lada", p:5000}, {n:"BMW M5", p:150000}, {n:"Tesla S", p:300000}],
    houses: [{n:"Квартира", p:80000}, {n:"Вилла", p:1000000}, {n:"Пентхаус", p:5000, cur:'eur'}],
    biz: [{n:"Ларек", p:30000, i:200}, {n:"Заправка", p:200000, i:1500}, {n:"Казино", p:5000000, i:25000}]
};

function auth() {
    let l = document.getElementById('l-in').value.toLowerCase().trim();
    let p = document.getElementById('p-in').value;
    if(!l || !p) return;
    db.ref('users/'+l).once('value', s => {
        if(s.exists() && s.val().pass !== p) return alert("Ошибка");
        if(!s.exists()) db.ref('users/'+l).set({login:l, pass:p, bal:5000, usd:0, eur:0, inv:[], isBanned:false});
        localStorage.setItem('mag_emp_u', l);
        location.reload();
    });
}

if(user) {
    db.ref('users/'+user).on('value', s => {
        uData = s.val();
        if(!uData) return;
        if(uData.isBanned) { document.getElementById('ban-screen').style.display = 'flex'; return; }
        
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('b-uah').innerText = (uData.bal||0).toLocaleString() + " ₴";
        document.getElementById('b-usd').innerText = (uData.usd||0).toLocaleString();
        document.getElementById('b-eur').innerText = (uData.eur||0).toLocaleString();
        
        if(uData.isAdmin) document.getElementById('adm-link').style.display = 'block';

        renderShop();
        renderInv();
    });
}

function renderShop() {
    const r = (id, type) => {
        let el = document.getElementById(id); el.innerHTML = '';
        items[type].forEach(i => {
            el.innerHTML += `<div class="shop-item"><b>${i.n}</b><span>${i.p} ${i.cur||'₴'}</span><button class="btn btn-blue" onclick="buy('${type}', '${i.n}', ${i.p}, '${i.cur||'bal'}')">Купить</button></div>`;
        });
    };
    r('shop-cars', 'cars'); r('shop-houses', 'houses'); r('shop-biz', 'biz');
}

function buy(type, name, price, cur) {
    let wallet = (cur === 'bal' ? uData.bal : uData[cur]);
    if(wallet < price) return alert("Недостаточно средств!");
    let newInv = uData.inv || [];
    newInv.push({n: name, type: type});
    let updateData = { inv: newInv };
    if(cur === 'bal') updateData.bal = uData.bal - price;
    else updateData[cur] = uData[cur] - price;
    db.ref('users/'+user).update(updateData);
    alert("Поздравляем с покупкой!");
}

function renderInv() {
    let el = document.getElementById('inventory-list'); el.innerHTML = '';
    (uData.inv || []).forEach(i => {
        el.innerHTML += `<div class="card">📦 ${i.n} (${i.type})</div>`;
    });
}

function work() { db.ref('users/'+user+'/bal').transaction(c => (c||0) + 20); }

function exchange(to) {
    let v = parseInt(document.getElementById('ex-val').value);
    if(!v || uData.bal < v) return;
    let rate = (to === 'usd' ? 40 : 45);
    db.ref('users/'+user).update({ bal: uData.bal - v, [to]: (uData[to]||0) + Math.floor(v/rate) });
}

function admDo(type) {
    let t = document.getElementById('a-user').value.toLowerCase();
    let v = parseInt(document.getElementById('a-sum').value);
    if(type === 'give') db.ref('users/'+t+'/bal').transaction(c => (c||0) + v);
    if(type === 'ban') db.ref('users/'+t).update({isBanned: true});
    if(type === 'unban') db.ref('users/'+t).update({isBanned: false});
    alert("Готово!");
}

function sw(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    el.classList.add('active');
}
function exit() { localStorage.clear(); location.reload(); }

// Доход от бизнесов раз в 1 минуту
setInterval(() => {
    if(!uData || !uData.inv) return;
    let income = 0;
    uData.inv.forEach(i => {
        if(i.type === 'biz') {
            let b = items.biz.find(x => x.n === i.n);
            if(b) income += b.i;
        }
    });
    if(income > 0) db.ref('users/'+user+'/bal').transaction(c => (c||0) + income);
}, 60000);
</script>
</body>
    </html>
