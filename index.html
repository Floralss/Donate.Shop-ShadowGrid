<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BroBank Dark Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #000; --card: #121212; --card-l: #1c1c1e; --accent: #ff3b30; --text: #fff; --sec: #8e8e93; --green: #34c759; --blue: #007aff; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background: var(--bg); color: var(--text); min-height: 100vh; }

#auth { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
.abox { width: 100%; max-width: 360px; padding: 20px; text-align: center; }

#app { display: none; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sb { background: var(--bg); border-right: 1px solid #2c2c2e; padding: 20px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
.nav-it { padding: 12px; border-radius: 12px; cursor: pointer; color: var(--sec); transition: 0.2s; margin-bottom: 5px; font-weight: 500; }
.nav-it.on { background: var(--card-l); color: #fff; }

.main { padding: 30px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

.m-card { background: var(--card-l); border-radius: 20px; padding: 20px; height: 170px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #2c2c2e; cursor: pointer; position: relative; }
.m-card.blocked { border: 2px solid var(--accent); opacity: 0.6; }
.m-card.blocked::after { content: 'ЗАБЛОКИРОВАНО'; position: absolute; top: 10px; right: 10px; color: var(--accent); font-size: 10px; font-weight: 800; border: 1px solid var(--accent); padding: 2px 5px; border-radius: 4px; }

.fine-alert { background: rgba(255, 59, 48, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 15px; border-radius: 15px; margin-bottom: 20px; }

.btn { background: #fff; color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-red { background: var(--accent); color: #fff; }
.input { width: 100%; background: var(--card-l); border: 1px solid #2c2c2e; padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 10px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #fff; color: #000; padding: 10px 20px; border-radius: 15px; transition: 0.3s; z-index: 1000; font-weight: 600; }
.toast.on { transform: translateX(-50%) translateY(0); }
.page { display: none; } .page.on { display: block; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="auth">
    <div class="abox">
        <h1 style="margin-bottom:20px">🏦 BroBank</h1>
        <div id="authF">
            <input id="li" class="input" placeholder="Логин">
            <input id="pi" class="input" type="password" placeholder="Пароль">
            <button class="btn" onclick="login()">Войти</button>
            <p style="margin-top:15px; color:var(--sec); cursor:pointer" onclick="regMode()">Создать аккаунт</p>
        </div>
    </div>
</div>

<div id="app">
    <div class="sb">
        <h2 style="margin-bottom:30px">BroBank</h2>
        <div class="nav">
            <div class="nav-it on" onclick="pg('dash')">Главная</div>
            <div class="nav-it" onclick="pg('click')">Заработок</div>
            <div class="nav-it" onclick="pg('shop')">Магазин</div>
            <div class="nav-it" onclick="pg('auc')">Аукцион ⚖️</div>
            <div class="nav-it" onclick="pg('inv')">Имущество</div>
            <div id="admB" class="nav-it" style="display:none; color:var(--accent)" onclick="pg('adm')">Админ-панель</div>
        </div>
        <button class="btn" style="margin-top:auto; background:none; color:var(--accent)" onclick="logout()">Выйти</button>
    </div>

    <div class="main">
        <div id="p-dash" class="page on">
            <div id="fineNotify"></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:20px">
                <h2>Ваши карты</h2>
                <button class="btn" style="width:auto; margin:0" onclick="createCard()">+ Новая карта</button>
            </div>
            <div id="cardList" class="grid"></div>
            <div style="margin-top:40px; max-width:400px; background:var(--card); padding:20px; border-radius:20px">
                <h3>Перевод денег</h3>
                <input id="tTo" class="input" placeholder="Номер карты">
                <input id="tAmt" class="input" type="number" placeholder="Сумма">
                <button class="btn btn-blue" onclick="transfer()">Отправить</button>
            </div>
        </div>

        <div id="p-click" class="page">
            <div style="text-align:center; padding:40px; background:var(--card); border-radius:25px">
                <div id="coin" style="font-size:100px; cursor:pointer; transition:0.1s" onclick="clicker()">🟡</div>
                <h2 id="clickVal" style="margin:20px 0">0.01 ₴</h2>
                <div id="upgList" class="grid"></div>
            </div>
        </div>

        <div id="p-shop" class="page">
            <h2>Магазин недвижимости</h2>
            <div id="shopList" class="grid" style="margin-top:20px"></div>
        </div>

        <div id="p-inv" class="page">
            <h2>Ваше имущество</h2>
            <div id="invList" class="grid" style="margin-top:20px"></div>
        </div>

        <div id="p-auc" class="page">
            <h2>Активные торги</h2>
            <div id="aucList" class="grid" style="margin-top:20px"></div>
        </div>

        <div id="p-adm" class="page">
            <h2>Панель управления</h2>
            <div class="grid" style="margin-top:20px">
                <div class="m-card" style="height:auto">
                    <h3>Штраф (24ч на оплату)</h3>
                    <input id="aLog" class="input" placeholder="Логин игрока">
                    <input id="aSum" class="input" type="number" placeholder="Сумма штрафа">
                    <button class="btn btn-red" onclick="admFine()">Выписать штраф</button>
                </div>
                <div class="m-card" style="height:auto">
                    <h3>Разблокировка</h3>
                    <input id="aCard" class="input" placeholder="Номер карты">
                    <button class="btn btn-blue" onclick="admUnblock()">Снять блокировку</button>
                </div>
                <div class="m-card" style="height:auto">
                    <h3>Управление аккаунтом</h3>
                    <input id="aBan" class="input" placeholder="Логин">
                    <button class="btn btn-red" onclick="admBan(true)">БАН</button>
                    <button class="btn" onclick="admBan(false)">Разбан</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('bro_db_v5')) || { users: {}, cards: {}, auctions: [] };
let cur = null;

function save() { localStorage.setItem('bro_db_v5', JSON.stringify(db)); }
function toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), 3000); }

// SESSION CHECK
window.onload = () => {
    let saved = localStorage.getItem('sessionUser');
    if(saved && db.users[saved]) {
        cur = db.users[saved];
        start();
    }
};

function regMode() {
    document.getElementById('authF').innerHTML = `
        <input id="rn" class="input" placeholder="Ваше Имя">
        <input id="rl" class="input" placeholder="Логин">
        <input id="rp" class="input" type="password" placeholder="Пароль">
        <input id="ra" class="input" type="password" placeholder="Админ-код">
        <button class="btn" onclick="doReg()">Создать аккаунт</button>
        <p style="margin-top:15px; color:var(--sec); cursor:pointer" onclick="location.reload()">Назад</p>
    `;
}

function doReg() {
    let l = document.getElementById('rl').value.toLowerCase().trim();
    if(db.users[l]) return toast("Логин занят");
    let cNum = "4441" + Math.floor(100000000000 + Math.random() * 899999999999);
    db.users[l] = {
        name: document.getElementById('rn').value, login: l, pass: document.getElementById('rp').value,
        isAdmin: document.getElementById('ra').value === "admin2024", isBanned: false,
        cards: [{num: cNum, bal: 100, type: '₴', blocked: false}], items: [], power: 0.05, fines: []
    };
    db.cards[cNum] = l; save(); toast("Успешно!"); location.reload();
}

function login() {
    let l = document.getElementById('li').value.toLowerCase().trim();
    let p = document.getElementById('pi').value;
    let u = db.users[l];
    if(u && u.pass === p) {
        if(u.isBanned) return toast("АККАУНТ ЗАБАНЕН");
        cur = u; localStorage.setItem('sessionUser', l); start();
    } else toast("Ошибка входа");
}

function logout() { localStorage.removeItem('sessionUser'); location.reload(); }

function start() {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'grid';
    if(cur.isAdmin) document.getElementById('admB').style.display = 'block';
    
    // Проверка штрафов и аукционов каждую секунду
    setInterval(() => {
        checkFines();
        updateAuctionTimers();
    }, 1000);

    pg('dash');
}

function pg(id) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
    document.querySelectorAll('.nav-it').forEach(n=>n.classList.remove('on'));
    document.getElementById('p-'+id).classList.add('on');
    event.currentTarget.classList.add('on');
    render();
}

// ОСНОВНАЯ ЛОГИКА
function checkFines() {
    let now = Date.now();
    let hasUnpaid = false;
    cur.fines.forEach(f => {
        if(!f.paid) {
            hasUnpaid = true;
            let timeLeft = f.deadline - now;
            if(timeLeft <= 0) {
                cur.cards.forEach(c => c.blocked = true);
            }
        }
    });
    
    const notify = document.getElementById('fineNotify');
    const unpaid = cur.fines.filter(f => !f.paid);
    if(unpaid.length > 0) {
        let f = unpaid[0];
        let diff = f.deadline - now;
        let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        notify.innerHTML = `
            <div class="fine-alert">
                <b>Внимание!</b> У вас неоплаченный штраф: ${f.amt} ₴. 
                До блокировки всех карт осталось: ${h}ч ${m}м ${s}с.
                <button class="btn btn-red" style="width:auto; padding:5px 15px; margin-left:20px" onclick="payFine(${cur.fines.indexOf(f)})">Оплатить</button>
            </div>`;
    } else {
        notify.innerHTML = "";
    }
}

function render() {
    // Карты
    document.getElementById('cardList').innerHTML = cur.cards.map(c => `
        <div class="m-card ${c.blocked?'blocked':''}" onclick="navigator.clipboard.writeText('${c.num}');toast('Номер скопирован')">
            <div><small>${c.type} Card</small><h2 style="margin-top:5px">${c.bal.toFixed(2)} ${c.type}</h2></div>
            <div style="font-family:monospace; letter-spacing:2px">${c.num.match(/.{1,4}/g).join(' ')}</div>
        </div>
    `).join('');

    // Инвентарь
    document.getElementById('invList').innerHTML = cur.items.map((it, i) => `
        <div class="m-card" style="height:auto">
            <h3>${it.name}</h3>
            <p style="color:var(--sec)">Цена: ${it.price} ₴</p>
            <button class="btn btn-blue" onclick="startAuc(${i})">На аукцион (1 час)</button>
            <button class="btn" style="background:#333; color:#fff" onclick="sellBank(${i}, ${it.price})">Продать банку (${(it.price*0.5).toFixed(0)} ₴)</button>
        </div>
    `).join('');

    // Магазин
    const shop = [{n:"Квартира", p:50000}, {n:"Дом у моря", p:300000}, {n:"BMW M4", p:150000}, {n:"Отель", p:2000000}];
    document.getElementById('shopList').innerHTML = shop.map(s => `
        <div class="m-card" style="height:auto">
            <h3>${s.n}</h3><p>${s.p} ₴</p>
            <button class="btn btn-blue" onclick="buyItem('${s.n}', ${s.p})">Купить</button>
        </div>
    `).join('');

    // Аукцион
    document.getElementById('aucList').innerHTML = db.auctions.map((a, i) => `
        <div class="m-card" style="height:auto">
            <div class="badge" style="background:var(--blue); font-size:10px; padding:3px 7px; border-radius:5px; width:fit-content">ЛОТ</div>
            <h3 style="margin:10px 0">${a.item.name}</h3>
            <p>Ставка: <b style="color:var(--green)">${a.curBid} ₴</b></p>
            <p style="font-size:12px; color:var(--sec)">Лидер: ${a.lastBidder || 'нет'}</p>
            <p id="timer-${i}" style="color:var(--accent); font-weight:700"></p>
            <button class="btn btn-blue" onclick="placeBid(${i})">Ставка +10%</button>
        </div>
    `).join('');

    save();
}

function payFine(idx) {
    let f = cur.fines[idx];
    if(cur.cards[0].bal < f.amt) return toast("Мало денег на основной карте");
    cur.cards[0].bal -= f.amt;
    cur.fines.splice(idx, 1);
    toast("Штраф оплачен!");
    render();
}

function createCard() {
    let t = prompt("Выберите валюту: UAH, USD, EUR").toUpperCase();
    if(!['UAH','USD','EUR'].includes(t)) return toast("Ошибка валюты");
    let sym = t==='USD'?'$':t==='EUR'?'€':'₴';
    let n = "4441" + Math.floor(100000000000 + Math.random() * 899999999999);
    cur.cards.push({num:n, bal:0, type:sym, blocked:false});
    db.cards[n] = cur.login; render();
}

function transfer() {
    let num = document.getElementById('tTo').value.replace(/\s/g,'');
    let amt = parseFloat(document.getElementById('tAmt').value);
    if(cur.cards[0].blocked) return toast("Карта заблокирована");
    if(cur.cards[0].bal < amt) return toast("Недостаточно средств");
    
    let targetLog = db.cards[num];
    if(targetLog) {
        cur.cards[0].bal -= amt;
        let tU = db.users[targetLog];
        let tC = tU.cards.find(c => c.num === num);
        tC.bal += amt;
        toast("Успешно отправлено!");
        render();
    } else toast("Карта не найдена");
}

// АУКЦИОН
function startAuc(idx) {
    let it = cur.items.splice(idx, 1)[0];
    db.auctions.push({ item: it, seller: cur.login, curBid: it.price, lastBidder: null, end: Date.now() + 3600000 });
    render();
}

function placeBid(idx) {
    let a = db.auctions[idx];
    if(a.seller === cur.login) return toast("Нельзя ставить на своё");
    let bid = Math.floor(a.curBid * 1.1);
    if(cur.cards[0].bal < bid) return toast("Мало денег");
    if(a.lastBidder) db.users[a.lastBidder].cards[0].bal += a.curBid; // Возврат
    cur.cards[0].bal -= bid; a.curBid = bid; a.lastBidder = cur.login; render();
}

function updateAuctionTimers() {
    db.auctions.forEach((a, i) => {
        let rem = a.end - Date.now();
        if(rem <= 0) { finishAuc(i); }
        else {
            let m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
            let el = document.getElementById(`timer-${i}`);
            if(el) el.innerText = `До конца: ${m}м ${s}с`;
        }
    });
}

function finishAuc(i) {
    let a = db.auctions.splice(i, 1)[0];
    if(a.lastBidder) {
        db.users[a.lastBidder].items.push(a.item);
        db.users[a.seller].cards[0].bal += a.curBid;
    } else {
        db.users[a.seller].items.push(a.item);
    }
    render();
}

function clicker() {
    if(cur.cards[0].blocked) return toast("Карта заблокирована!");
    cur.cards[0].bal += cur.power;
    document.getElementById('coin').style.transform = 'scale(0.9)';
    setTimeout(()=>document.getElementById('coin').style.transform='scale(1)', 50);
    render();
}

function buyItem(n, p) {
    if(cur.cards[0].bal < p) return toast("Мало денег");
    cur.cards[0].bal -= p; cur.items.push({name:n, price:p}); render();
}

function sellBank(idx, p) {
    cur.cards[0].bal += p * 0.5;
    cur.items.splice(idx, 1);
    render();
}

// АДМИНКА
function admFine() {
    let u = db.users[document.getElementById('aLog').value.toLowerCase().trim()];
    let s = parseFloat(document.getElementById('aSum').value);
    if(u) {
        u.fines.push({ amt: s, deadline: Date.now() + 86400000, paid: false }); // +24 часа
        toast("Штраф выписан. Таймер на 24 часа пошел.");
        save();
    } else toast("Игрок не найден");
}

function admUnblock() {
    let n = document.getElementById('aCard').value.replace(/\s/g,'');
    let uL = db.cards[n];
    if(uL) {
        let card = db.users[uL].cards.find(c=>c.num === n);
        card.blocked = false;
        toast("Карта разблокирована. Баланс сохранен.");
        save();
    }
}

function admBan(v) {
    let u = db.users[document.getElementById('aBan').value.toLowerCase().trim()];
    if(u) { u.isBanned = v; toast(v?"ЗАБАНЕН":"РАЗБАНЕН"); save(); }
}
</script>
</body>
</html>
