<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BroBank Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121214; --accent: #007AFF; --danger: #FF3B30; --success: #34C759; --text: #FFFFFF; --sec: #8E8E93; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* UI Helpers */
        .btn { background: #fff; color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-red { background: var(--danger); color: #fff; }
        .input { width: 100%; background: #1c1c1e; border: 1px solid #2c2c2e; padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 10px; outline: none; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 12px 25px; border-radius: 30px; z-index: 1000; transition: 0.4s; font-weight: 600; }
        .toast.on { transform: translateX(-50%) translateY(0); }

        /* Layout */
        #app { display: none; min-height: 100vh; }
        .sidebar { background: #000; border-right: 1px solid #1c1c1e; padding: 25px; display: flex; flex-direction: column; width: 260px; height: 100vh; position: sticky; top: 0; }
        .content { flex: 1; padding: 20px; padding-bottom: 100px; }
        .nav-item { padding: 14px; border-radius: 12px; cursor: pointer; color: var(--sec); margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: var(--card); color: #fff; }
        .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: none; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #1c1c1e; height: 70px; z-index: 99; }
        @media (max-width: 768px) { .sidebar { display: none; } .mobile-nav { display: grid; } }

        /* Cards & Assets */
        .bank-card { background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); border-radius: 20px; padding: 25px; border: 1px solid #333; position: relative; margin-bottom: 20px; }
        .bank-card.blocked { border-color: var(--danger); opacity: 0.7; }
        .card-bal { font-size: 32px; font-weight: 800; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .item-card { background: var(--card); border-radius: 18px; padding: 20px; border: 1px solid #1c1c1e; position: relative; }
        .badge { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 3px 8px; border-radius: 5px; background: var(--accent); }

        /* Clicker */
        .click-area { text-align: center; padding: 30px; background: var(--card); border-radius: 20px; margin-bottom: 20px; }
        #coin { font-size: 80px; cursor: pointer; display: inline-block; transition: 0.1s; user-select: none; }
        #coin:active { transform: scale(0.9); }

        .page { display: none; } .page.active { display: block; }
        .avatar-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="auth" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div style="width: 100%; max-width: 350px; text-align: center;">
        <h1 style="font-size: 40px; margin-bottom: 30px;">BroBank</h1>
        <div id="authFields">
            <input id="li" class="input" placeholder="Логин">
            <input id="pi" class="input" type="password" placeholder="Пароль">
            <button class="btn btn-blue" onclick="login()">Войти</button>
            <button class="btn" style="background:none; color:#fff" onclick="regView()">Создать счет</button>
        </div>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <h2 style="margin-bottom: 30px;">BroBank</h2>
        <div class="nav-item active" onclick="showPg('dash', this)">🏠 Главная</div>
        <div class="nav-item" onclick="showPg('trans', this)">💸 Переводы</div>
        <div class="nav-item" onclick="showPg('market', this)">🛒 Маркет</div>
        <div class="nav-item" onclick="showPg('games', this)">🚀 Игры</div>
        <div class="nav-item" onclick="showPg('profile', this)">👤 Профиль</div>
        <div id="admBtn" class="nav-item" style="display:none; color: var(--danger);" onclick="showPg('adm', this)">🛠️ Админ</div>
        <button class="btn-red btn" style="margin-top: auto;" onclick="logout()">Выход</button>
    </div>

    <div class="mobile-nav">
        <div class="m-nav-it active" onclick="showPg('dash', this)" style="display:flex; justify-content:center; align-items:center;">🏠</div>
        <div class="m-nav-it" onclick="showPg('trans', this)" style="display:flex; justify-content:center; align-items:center;">💸</div>
        <div class="m-nav-it" onclick="showPg('market', this)" style="display:flex; justify-content:center; align-items:center;">🛒</div>
        <div class="m-nav-it" onclick="showPg('games', this)" style="display:flex; justify-content:center; align-items:center;">🚀</div>
        <div class="m-nav-it" onclick="showPg('profile', this)" style="display:flex; justify-content:center; align-items:center;">👤</div>
    </div>

    <div class="content">
        <div id="pg-dash" class="page active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <div><h1 id="userName">...</h1><p id="userStatus" style="color:var(--sec); font-size:12px"></p></div>
                <img id="userAv" class="avatar-img" src="" alt="">
            </div>
            
            <div class="click-area">
                <div id="coin" onclick="moneyClick()">💰</div>
                <p style="margin-top:10px; color:var(--sec)">Нажимай на мешок!</p>
            </div>

            <div id="cardsBox"></div>
            <h3>Мои активы</h3>
            <div id="assetsGrid" class="grid" style="margin-top:15px"></div>
        </div>

        <div id="pg-market" class="page">
            <div style="display:flex; gap:10px; margin-bottom:20px">
                <button class="btn btn-blue" onclick="renderMarket('state')">Гос. Магазин</button>
                <button class="btn" onclick="renderMarket('p2p')">Торговая площадка</button>
            </div>
            <div id="marketGrid" class="grid"></div>
        </div>

        <div id="pg-trans" class="page">
            <h2>Переводы по логину</h2>
            <div class="item-card" style="margin-top:20px">
                <input id="trLog" class="input" placeholder="Логин получателя">
                <input id="trSum" class="input" type="number" placeholder="Сумма ₴">
                <button class="btn btn-blue" onclick="doTransfer()">Отправить</button>
            </div>
        </div>

        <div id="pg-profile" class="page">
            <h2>Настройки</h2>
            <div class="item-card" style="margin-top:20px">
                <p>Ссылка на аватарку:</p>
                <input id="avUrl" class="input" placeholder="https://image.com/photo.jpg">
                <input id="newNick" class="input" placeholder="Новое имя">
                <button class="btn btn-blue" onclick="saveProfile()">Обновить данные</button>
            </div>
        </div>

        <div id="pg-games" class="page">
            <div id="rocket-zone">
                <div id="rocket-mult" class="multiplier">x1.00</div>
            </div>
            <input id="betSum" class="input" style="margin-top:15px" type="number" placeholder="Ставка ₴">
            <button id="betBtn" class="btn btn-blue" onclick="startRocket()">СТАРТ</button>
        </div>

        <div id="pg-adm" class="page">
            <h2>Админ Панель</h2>
            <div class="grid" style="margin-top:20px">
                <div class="item-card">
                    <h3>Бан/Разбан</h3>
                    <input id="aLog" class="input" placeholder="Логин">
                    <div style="display:flex; gap:5px">
                        <button class="btn btn-red" onclick="admBan(true)">БАН</button>
                        <button class="btn" onclick="admBan(false)">РАЗБАН</button>
                    </div>
                </div>
                <div class="item-card">
                    <h3>Штрафы / Деньги</h3>
                    <input id="aLog2" class="input" placeholder="Логин">
                    <input id="aSum" class="input" type="number" placeholder="Сумма (+ или -)">
                    <button class="btn btn-blue" onclick="admMoney()">Выполнить</button>
                </div>
                <div class="item-card">
                    <h3>Упр. Картами</h3>
                    <input id="aCard" class="input" placeholder="Номер карты">
                    <div style="display:flex; gap:5px">
                        <button class="btn btn-red" onclick="admCard(true)">БЛОК</button>
                        <button class="btn" onclick="admCard(false)">РАЗБЛОК</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('bro_v7')) || { users: {}, cards: {}, market: [] };
let cur = null;
let rocketFlying = false;

const save = () => localStorage.setItem('bro_v7', JSON.stringify(db));
const toast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), 3000); };

function regView() {
    document.getElementById('authFields').innerHTML = `
        <input id="rl" class="input" placeholder="Придумайте логин">
        <input id="rp" class="input" type="password" placeholder="Пароль">
        <input id="ra" class="input" type="password" placeholder="Админ-код">
        <button class="btn btn-blue" onclick="doReg()">Создать</button>
        <button class="btn" style="background:none; color:#fff" onclick="location.reload()">Назад</button>
    `;
}

function doReg() {
    let l = document.getElementById('rl').value.toLowerCase().trim();
    if(!l || db.users[l]) return toast("Логин занят");
    let cNum = "4441" + Math.floor(1000 + Math.random() * 8999) + Math.floor(1000 + Math.random() * 8999);
    db.users[l] = {
        name: 'Новый игрок', login: l, pass: document.getElementById('rp').value,
        avatar: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
        isAdmin: document.getElementById('ra').value === 'admin99',
        bal: 100, card: cNum, cardBlocked: false, assets: [], isBanned: false
    };
    db.cards[cNum] = l; save(); location.reload();
}

function login() {
    let l = document.getElementById('li').value.toLowerCase().trim();
    let p = document.getElementById('pi').value;
    if(db.users[l] && db.users[l].pass === p) {
        if(db.users[l].isBanned) return toast("ВЫ ЗАБАНЕНЫ");
        localStorage.setItem('session', l);
        location.reload();
    } else toast("Ошибка входа");
}

function logout() { localStorage.removeItem('session'); location.reload(); }

function init() {
    let s = localStorage.getItem('session');
    if(s && db.users[s]) {
        cur = db.users[s];
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if(cur.isAdmin) document.getElementById('admBtn').style.display = 'flex';
        updateUI();
    }
}

function updateUI() {
    document.getElementById('userName').innerText = cur.name;
    document.getElementById('userAv').src = cur.avatar;
    document.getElementById('userStatus').innerText = cur.isAdmin ? 'Сотрудник Банка' : 'Клиент';
    
    document.getElementById('cardsBox').innerHTML = `
        <div class="bank-card ${cur.cardBlocked ? 'blocked' : ''}">
            <p>BRO PLATINUM</p>
            <div class="card-bal">${cur.bal.toLocaleString()} ₴</div>
            <p style="font-family:monospace">${cur.card}</p>
            ${cur.cardBlocked ? '<b style="color:var(--danger)">ЗАБЛОКИРОВАНА</b>' : ''}
        </div>
    `;

    document.getElementById('assetsGrid').innerHTML = cur.assets.map((a, i) => `
        <div class="item-card">
            <h3>${a.n}</h3>
            <p style="color:var(--sec)">Доход: ${a.i} ₴/мин</p>
            <button class="btn" style="margin-top:10px; font-size:12px" onclick="sellToP2P(${i})">На продажу</button>
        </div>
    `).join('') || 'У вас нет имущества';
}

function showPg(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item, .m-nav-it').forEach(n => n.classList.remove('active'));
    document.getElementById('pg-'+id).classList.add('active');
    el.classList.add('active');
    if(id === 'market') renderMarket('state');
}

// Clicker
function moneyClick() {
    if(cur.cardBlocked) return toast("Карта заблокирована!");
    cur.bal += 0.50;
    save(); updateUI();
}

// Market
const STATE_ITEMS = [
    {n:"Шаурмичная", p:10000, i:200}, {n:"СТО", p:100000, i:2500}, {n:"Отель", p:1000000, i:30000}
];

function renderMarket(mode) {
    let grid = document.getElementById('marketGrid');
    if(mode === 'state') {
        grid.innerHTML = STATE_ITEMS.map(it => `
            <div class="item-card">
                <h3>${it.n}</h3><p>${it.p.toLocaleString()} ₴</p>
                <button class="btn btn-blue" onclick="buyState('${it.n}', ${it.p}, ${it.i})">Купить</button>
            </div>
        `).join('');
    } else {
        grid.innerHTML = db.market.map((it, i) => `
            <div class="item-card">
                <div class="badge">P2P</div>
                <h3>${it.n}</h3><p>${it.p.toLocaleString()} ₴</p>
                <p style="font-size:10px">Продавец: ${it.seller}</p>
                <button class="btn btn-blue" onclick="buyP2P(${i})">Купить</button>
            </div>
        `).join('') || 'Нет активных объявлений';
    }
}

function buyState(n, p, i) {
    if(cur.bal < p || cur.cardBlocked) return toast("Отказ");
    cur.bal -= p; cur.assets.push({n, i}); save(); updateUI(); toast("Куплено!");
}

function sellToP2P(idx) {
    let p = prompt("Введите цену продажи:");
    if(!p || isNaN(p)) return;
    let item = cur.assets.splice(idx, 1)[0];
    db.market.push({ ...item, p: parseInt(p), seller: cur.login });
    save(); updateUI(); toast("Выставлено на рынок!");
}

function buyP2P(idx) {
    let it = db.market[idx];
    if(cur.bal < it.p || cur.cardBlocked) return toast("Мало денег");
    cur.bal -= it.p;
    db.users[it.seller].bal += it.p;
    cur.assets.push({n: it.n, i: it.i});
    db.market.splice(idx, 1);
    save(); updateUI(); toast("Покупка завершена!");
}

// Admin Logic
function admBan(val) {
    let l = document.getElementById('aLog').value.trim();
    if(db.users[l]) { db.users[l].isBanned = val; save(); toast("Статус изменен"); }
}

function admMoney() {
    let l = document.getElementById('aLog2').value.trim();
    let s = parseInt(document.getElementById('aSum').value);
    if(db.users[l]) { db.users[l].bal += s; save(); toast("Баланс обновлен"); }
}

function admCard(val) {
    let c = document.getElementById('aCard').value.trim();
    let l = db.cards[c];
    if(l && db.users[l]) { db.users[l].cardBlocked = val; save(); toast("Карта изменена"); }
}

function saveProfile() {
    let av = document.getElementById('avUrl').value;
    let ni = document.getElementById('newNick').value;
    if(av) cur.avatar = av;
    if(ni) cur.name = ni;
    save(); updateUI(); toast("Профиль обновлен");
}

function doTransfer() {
    let l = document.getElementById('trLog').value.toLowerCase().trim();
    let s = parseInt(document.getElementById('trSum').value);
    if(db.users[l] && s > 0 && cur.bal >= s && !cur.cardBlocked) {
        cur.bal -= s; db.users[l].bal += s; save(); updateUI(); toast("Отправлено!");
    } else toast("Ошибка перевода");
}

function startRocket() {
    if(rocketFlying) return;
    let bet = parseInt(document.getElementById('betSum').value);
    if(bet > 0 && cur.bal >= bet) {
        cur.bal -= bet; rocketFlying = true;
        let mult = 1.0;
        let btn = document.getElementById('betBtn');
        btn.innerText = "ЗАБРАТЬ"; btn.classList.replace('btn-blue', 'btn-red');
        
        let loop = setInterval(() => {
            mult += 0.03;
            document.getElementById('rocket-mult').innerText = 'x' + mult.toFixed(2);
            if(Math.random() < 0.02) {
                clearInterval(loop); rocketFlying = false;
                btn.innerText = "СТАРТ"; btn.classList.replace('btn-red', 'btn-blue');
                document.getElementById('rocket-mult').innerText = "BOOM!";
                save(); updateUI();
            }
        }, 100);

        btn.onclick = () => {
            clearInterval(loop); rocketFlying = false;
            cur.bal += Math.floor(bet * mult);
            btn.innerText = "СТАРТ"; btn.classList.replace('btn-red', 'btn-blue');
            toast("Выигрыш!"); save(); updateUI();
            btn.onclick = startRocket;
        };
    }
}

// Прибыль раз в минуту
setInterval(() => {
    if(cur) {
        let total = cur.assets.reduce((s, a) => s + a.i, 0);
        if(total > 0 && !cur.cardBlocked) {
            cur.bal += total; save(); updateUI();
        }
    }
}, 60000);

init();
</script>
</body>
</html>
