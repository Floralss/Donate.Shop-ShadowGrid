<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magniy Bank OS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121214; --accent: #007AFF; --danger: #FF3B30; --success: #34C759; --text: #fff; --sec: #8E8E93; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth */
        #auth { display: flex; height: 100vh; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { width: 100%; max-width: 360px; text-align: center; }

        /* Main Layout */
        #app { display: none; height: 100vh; width: 100vw; display: flex; }
        .sidebar { width: 250px; background: #000; border-right: 1px solid #1c1c1e; padding: 20px; display: flex; flex-direction: column; shrink: 0; }
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; background: var(--bg); }

        /* Card */
        .card-wrapper { perspective: 1000px; margin-bottom: 20px; }
        .bank-card { width: 100%; max-width: 320px; height: 180px; position: relative; transform-style: preserve-3d; transition: 0.6s; cursor: pointer; }
        .bank-card.flipped { transform: rotateY(180deg); }
        .card-side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: space-between; }
        .card-f { background: linear-gradient(135deg, #1e1e1e, #000); }
        .card-b { background: #111; transform: rotateY(180deg); justify-content: center; align-items: center; }
        .card-num { font-size: 18px; letter-spacing: 2px; font-family: monospace; }

        /* UI */
        .btn { background: #fff; color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 10px; transition: 0.2s; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-red { background: var(--danger); color: #fff; }
        .btn-green { background: var(--success); color: #fff; }
        .input { width: 100%; background: #1c1c1e; border: 1px solid #2c2c2e; padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 10px; outline: none; }

        .nav-link { padding: 12px; border-radius: 10px; cursor: pointer; color: var(--sec); margin-bottom: 5px; font-size: 14px; }
        .nav-link.active { background: var(--card); color: #fff; border: 1px solid #222; }

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .shop-item { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; text-align: center; }

        #chat-box { height: 200px; overflow-y: auto; background: #000; border-radius: 12px; padding: 10px; border: 1px solid #222; margin-bottom: 10px; font-size: 13px; }
        .page { display: none; } .page.active { display: block; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 10px 20px; border-radius: 20px; z-index: 999; transition: 0.4s; font-weight: 700; }
        .toast.on { transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) { .sidebar { display: none; } .mobile-nav { display: grid; position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; grid-template-columns: repeat(6, 1fr); border-top: 1px solid #222; } }
        .mobile-nav { display: none; } .m-item { display: flex; align-items: center; justify-content: center; color: var(--sec); }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="auth">
    <div class="auth-box">
        <h1 style="margin-bottom:20px">MAGNIY BANK</h1>
        <div id="auth-ui">
            <input id="l-in" class="input" placeholder="Логин">
            <input id="p-in" class="input" type="password" placeholder="Пароль">
            <button class="btn btn-blue" onclick="doLogin()">Войти</button>
            <button class="btn" style="background:none; color:var(--sec)" onclick="showReg()">Регистрация</button>
        </div>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <h3 style="margin-bottom:20px">Magniy Bank</h3>
        <div class="nav-link active" onclick="sw('dash', this)">🏠 Главная</div>
        <div class="nav-link" onclick="sw('shop', this)">🛍️ Торговая площадка</div>
        <div class="nav-link" onclick="sw('game', this)">🎰 Казино</div>
        <div class="nav-link" onclick="sw('chat', this)">💬 Чат</div>
        <div class="nav-link" onclick="sw('send', this)">💸 Переводы</div>
        <div id="adm-link" class="nav-link" style="display:none; color:var(--danger)" onclick="sw('adm', this)">🛠️ Админка</div>
        <button class="btn btn-red" style="margin-top:auto" onclick="exit()">Выход</button>
    </div>

    <div class="main">
        <div id="p-dash" class="page active">
            <h2 id="u-name">...</h2>
            <div class="card-wrapper">
                <div class="bank-card" onclick="this.classList.toggle('flipped')">
                    <div class="card-side card-f">
                        <div style="width:40px; height:25px; background:gold; border-radius:4px;"></div>
                        <div class="card-num" id="c-num">0000 0000 0000 0000</div>
                        <div style="display:flex; justify-content:space-between; font-size:10px;">
                            <span id="c-owner">...</span> <span id="c-date">04/30</span>
                        </div>
                    </div>
                    <div class="card-side card-b">
                        <div style="background:#fff; color:#000; padding:5px 15px; font-weight:900;" id="c-cvv">000</div>
                    </div>
                </div>
            </div>
            <div style="background:var(--card); padding:20px; border-radius:15px; margin-bottom:15px;">
                <p style="opacity:0.6">Баланс</p>
                <h1 id="u-bal">0 ₴</h1>
            </div>
            <button class="btn btn-blue" onclick="clickWork()">💰 Кликнуть (+1 ₴)</button>
            <h3 style="margin: 20px 0 10px;">Моё имущество</h3>
            <div id="my-assets" class="shop-grid"></div>
        </div>

        <div id="p-shop" class="page">
            <h2>Торговая площадка</h2><br>
            <div class="shop-grid" id="shop-items"></div>
        </div>

        <div id="p-game" class="page">
            <h2>Казино "Magniy"</h2><br>
            <div class="shop-item">
                <input id="bet-sum" class="input" type="number" placeholder="Сумма ставки">
                <button class="btn btn-green" onclick="playGame()">Крутить рулетку (x2)</button>
            </div>
        </div>

        <div id="p-chat" class="page">
            <h2>Чат</h2>
            <div id="chat-box"></div>
            <input id="m-in" class="input" placeholder="Сообщение...">
            <button class="btn btn-blue" onclick="sendMsg()">Отправить</button>
        </div>

        <div id="p-send" class="page">
            <h2>Переводы</h2>
            <input id="t-log" class="input" placeholder="Логин получателя">
            <input id="t-sum" class="input" type="number" placeholder="Сумма">
            <button class="btn btn-blue" onclick="doTransfer()">Перевести</button>
        </div>

        <div id="p-adm" class="page">
            <h2>Админ-панель</h2>
            <input id="a-log" class="input" placeholder="Логин">
            <input id="a-sum" class="input" type="number" placeholder="Сумма">
            <button class="btn btn-blue" onclick="admAct('add')">Выдать ₴</button>
            <button class="btn btn-red" onclick="admAct('ban')">Забанить</button>
        </div>
    </div>

    <div class="mobile-nav">
        <div class="m-item" onclick="sw('dash')">🏠</div>
        <div class="m-item" onclick="sw('shop')">🛒</div>
        <div class="m-item" onclick="sw('game')">🎰</div>
        <div class="m-item" onclick="sw('chat')">💬</div>
        <div class="m-item" onclick="sw('send')">💸</div>
        <div class="m-item" onclick="exit()">🚪</div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDmf-lcDM5hXBwBqzymGlzdoHdTGfT2pRg",
  authDomain: "magniybank.firebaseapp.com",
  databaseURL: "https://magniybank-default-rtdb.firebaseio.com",
  projectId: "magniybank",
  storageBucket: "magniybank.firebasestorage.app",
  messagingSenderId: "1006815080708",
  appId: "1:1006815080708:web:e9c3afd0a15d8abbe46051"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let session = localStorage.getItem('user');
let uData = null;

const toast = (m) => { const t = document.getElementById('toast'); t.innerText=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), 3000); };

// --- Auth ---
function doLogin() {
    let l = document.getElementById('l-in').value.toLowerCase().trim();
    let p = document.getElementById('p-in').value;
    db.ref('users/'+l).once('value', s => {
        let d = s.val();
        if(d && d.pass === p) {
            if(d.isBanned) return toast("БАН!");
            localStorage.setItem('user', l); location.reload();
        } else toast("Ошибка!");
    });
}

function showReg() {
    document.getElementById('auth-ui').innerHTML = `<input id="rl" class="input" placeholder="Логин"><input id="rp" class="input" type="password" placeholder="Пароль"><input id="rn" class="input" placeholder="Имя ENG"><button class="btn btn-blue" onclick="doReg()">Создать</button><button class="btn" onclick="location.reload()">Назад</button>`;
}

function doReg() {
    let l = document.getElementById('rl').value.toLowerCase().trim();
    let p = document.getElementById('rp').value;
    let n = document.getElementById('rn').value || "CLIENT";
    let card = "4441 " + Math.floor(1000+Math.random()*8999) + " " + Math.floor(1000+Math.random()*8999) + " " + Math.floor(1000+Math.random()*8999);
    db.ref('users/'+l).set({ login:l, pass:p, name:n, bal:1000, cardN:card, cardC:Math.floor(100+Math.random()*899), isAdmin:false, assets:[] }).then(()=> { localStorage.setItem('user', l); location.reload(); });
}

// --- Logic ---
const shopItems = [
    {n: "Ларек", p: 50000, t: "Бизнес"}, {n: "BMW M5", p: 450000, t: "Авто"}, {n: "Особняк", p: 2500000, t: "Дом"}, {n: "Магнит", p: 10000000, t: "Бизнес"}
];

if(session) {
    db.ref('users/'+session).on('value', s => {
        uData = s.val();
        if(!uData) return;
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('u-name').innerText = "Привет, " + uData.name;
        document.getElementById('u-bal').innerText = uData.bal.toLocaleString() + " ₴";
        document.getElementById('c-num').innerText = uData.cardN;
        document.getElementById('c-owner').innerText = uData.name.toUpperCase();
        document.getElementById('c-cvv').innerText = uData.cardC;
        if(uData.isAdmin) document.getElementById('adm-link').style.display = 'block';
        
        let assetsDiv = document.getElementById('my-assets');
        assetsDiv.innerHTML = (uData.assets || []).map(a => `<div class="shop-item">${a}</div>`).join('');
    });

    db.ref('chat').limitToLast(15).on('value', s => {
        let box = document.getElementById('chat-box'); box.innerHTML = '';
        s.forEach(c => { box.innerHTML += `<div><b>${c.val().u}:</b> ${c.val().t}</div>`; });
        box.scrollTop = box.scrollHeight;
    });
}

function clickWork() { db.ref('users/'+session+'/bal').set(uData.bal + 1); }
function sendMsg() { let t = document.getElementById('m-in').value; if(t) db.ref('chat').push({u:uData.name, t:t}); document.getElementById('m-in').value = ''; }

function sw(id, el) { 
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
}

// Магазин
document.getElementById('shop-items').innerHTML = shopItems.map(i => `
    <div class="shop-item">
        <b>${i.n}</b><p>${i.p.toLocaleString()} ₴</p><small>${i.t}</small><br><br>
        <button class="btn btn-blue" onclick="buyItem('${i.n}', ${i.p})">Купить</button>
    </div>
`).join('');

function buyItem(n, p) {
    if(uData.bal < p) return toast("Мало денег!");
    let assets = uData.assets || []; assets.push(n);
    db.ref('users/'+session).update({ bal: uData.bal - p, assets: assets });
    toast("Куплено!");
}

// Казино
function playGame() {
    let bet = parseInt(document.getElementById('bet-sum').value);
    if(!bet || bet > uData.bal || bet <= 0) return toast("Ошибка ставки");
    if(Math.random() > 0.5) {
        db.ref('users/'+session+'/bal').set(uData.bal + bet); toast("ПОБЕДА!");
    } else {
        db.ref('users/'+session+'/bal').set(uData.bal - bet); toast("ПРОИГРЫШ");
    }
}

function doTransfer() {
    let to = document.getElementById('t-log').value.toLowerCase().trim();
    let sum = parseInt(document.getElementById('t-sum').value);
    db.ref('users/'+to).once('value', s => {
        if(s.exists() && uData.bal >= sum) {
            db.ref('users/'+session+'/bal').set(uData.bal - sum);
            db.ref('users/'+to+'/bal').set(s.val().bal + sum);
            toast("Успешно!");
        }
    });
}

function admAct(type) {
    let l = document.getElementById('a-log').value.toLowerCase().trim();
    let v = parseInt(document.getElementById('a-sum').value);
    let r = db.ref('users/'+l);
    if(type === 'add') r.once('value', s => { r.update({ bal: s.val().bal + v }); });
    if(type === 'ban') r.update({ isBanned: true });
    toast("Готово");
}

function exit() { localStorage.removeItem('user'); location.reload(); }
</script>
</body>
                </html>
