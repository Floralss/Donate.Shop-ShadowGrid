<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magniy OS Gold Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121214; --accent: #007AFF; --danger: #FF3B30; --success: #34C759; --gold: #D4AF37; --text: #fff; --sec: #8E8E93; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #auth { display: flex; height: 100vh; align-items: center; justify-content: center; background: #000; padding: 20px; }
        .auth-box { width: 100%; max-width: 360px; text-align: center; }

        /* Sidebar & Layout */
        #app { display: none; height: 100vh; width: 100vw; display: flex; }
        .sidebar { width: 260px; background: #000; border-right: 1px solid #1c1c1e; padding: 25px; display: flex; flex-direction: column; shrink: 0; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; background: var(--bg); }

        /* Navigation */
        .nav-link { padding: 14px 18px; border-radius: 14px; cursor: pointer; color: var(--sec); margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .nav-link:hover { background: #111; color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; font-weight: 600; }
        .nav-admin { border: 1px solid var(--danger); color: var(--danger) !important; }

        /* Card Styles */
        .cards-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .bank-card { min-width: 300px; height: 180px; position: relative; border-radius: 20px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: linear-gradient(135deg, #222, #000); }
        .card-usd { background: linear-gradient(135deg, #1e3a8a, #000); }
        .card-eur { background: linear-gradient(135deg, #3f3f46, #18181b); }
        .card-num { font-size: 18px; letter-spacing: 2px; font-family: monospace; font-weight: 700; }
        .card-chip { width: 40px; height: 30px; background: var(--gold); border-radius: 6px; }

        /* UI Elements */
        .bal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .bal-item { background: var(--card); padding: 18px; border-radius: 16px; border: 1px solid #222; text-align: center; }
        .bal-item span { font-size: 10px; color: var(--sec); text-transform: uppercase; }
        .bal-item b { display: block; font-size: 18px; margin-top: 5px; color: var(--success); }

        .btn { background: #fff; color: #000; border: none; padding: 15px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; margin-bottom: 10px; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-red { background: var(--danger); color: #fff; }
        .input { width: 100%; background: #1c1c1e; border: 1px solid #2c2c2e; padding: 15px; border-radius: 14px; color: #fff; margin-bottom: 12px; outline: none; }

        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .shop-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222; text-align: center; }

        .page { display: none; } .page.active { display: block; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 12px 30px; border-radius: 50px; z-index: 10000; transition: 0.4s; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.on { transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) { .sidebar { display: none; } .mobile-nav { display: grid; position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; grid-template-columns: repeat(6, 1fr); border-top: 1px solid #222; } }
        .mobile-nav { display: none; } .m-item { display: flex; align-items: center; justify-content: center; color: var(--sec); font-size: 24px; }
    </style>
</head>
<body>

<div id="toast">Уведомление</div>

<div id="auth">
    <div class="auth-box">
        <h1 style="font-weight:900; letter-spacing:-2px; font-size:48px; margin-bottom:40px;">MAGNIY</h1>
        <div id="auth-ui">
            <input id="l-in" class="input" placeholder="Логин">
            <input id="p-in" class="input" type="password" placeholder="Пароль">
            <button class="btn btn-blue" onclick="doLogin()">Войти в аккаунт</button>
            <button class="btn" style="background:none; color:var(--sec)" onclick="showReg()">Создать новый аккаунт</button>
        </div>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <h2 style="color:var(--accent); margin-bottom:30px;">Magniy Bank</h2>
        <div class="nav-link active" onclick="sw('dash', this)">🏠 Главная</div>
        <div class="nav-link" onclick="sw('cards', this)">💳 Мои карты</div>
        <div class="nav-link" onclick="sw('exch', this)">💱 Обменник</div>
        <div class="nav-link" onclick="sw('shop', this)">🛍️ Магазины</div>
        <div class="nav-link" onclick="sw('game', this)">♠️ Казино 21</div>
        <div id="adm-nav" class="nav-link nav-admin" style="display:none;" onclick="sw('adm', this)">🛠️ АДМИН ПАНЕЛЬ</div>
        
        <button class="btn btn-red" style="margin-top:auto" onclick="exit()">🚪 ВЫЙТИ</button>
    </div>

    <div class="main">
        <div id="p-dash" class="page active">
            <h2 id="u-greet">Привет!</h2><br>
            <div class="bal-grid">
                <div class="bal-item"><span>Гривны</span><b id="b-uah">0 ₴</b></div>
                <div class="bal-item"><span>Доллары</span><b id="b-usd">0 $</b></div>
                <div class="bal-item"><span>Евро</span><b id="b-eur">0 €</b></div>
            </div>
            <button class="btn btn-blue" onclick="work()">💰 Заработать 5 ₴ (Клик)</button>
            
            <h3 style="margin-top:30px;">Мое имущество</h3>
            <div id="my-assets" class="item-grid" style="margin-top:15px;"></div>
        </div>

        <div id="p-cards" class="page">
            <h2>Ваши банковские карты</h2><br>
            <div class="cards-container" id="cards-list"></div>
            <br>
            <h3>Выпустить новую карту</h3><br>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-blue" onclick="issueCard('USD')">Карта USD ($)</button>
                <button class="btn btn-blue" onclick="issueCard('EUR')">Карта EUR (€)</button>
            </div>
        </div>

        <div id="p-exch" class="page">
            <h2>Обмен валют</h2><br>
            <div class="bal-item" style="text-align:left">
                <p style="margin-bottom:15px;">Курс: 1$ = 40₴ | 1€ = 45₴</p>
                <input id="ex-amount" class="input" type="number" placeholder="Сумма">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn btn-blue" onclick="exchange('uah','usd')">₴ в $</button>
                    <button class="btn btn-blue" onclick="exchange('uah','eur')">₴ в €</button>
                    <button class="btn btn-blue" onclick="exchange('usd','uah')">$ в ₴</button>
                    <button class="btn btn-blue" onclick="exchange('eur','uah')">€ в ₴</button>
                </div>
            </div>
        </div>

        <div id="p-shop" class="page">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn" onclick="renderShop('auto')">🏎️ Автосалон</button>
                <button class="btn" onclick="renderShop('home')">🏠 Недвижимость</button>
                <button class="btn" onclick="renderShop('biz')">💼 Бизнесы</button>
            </div>
            <div id="shop-grid" class="item-grid"></div>
        </div>

        <div id="p-adm" class="page">
            <h2>Управление системой</h2><br>
            <input id="a-user" class="input" placeholder="Логин игрока">
            <input id="a-val" class="input" type="number" placeholder="Сумма">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn btn-blue" onclick="admAction('bal')">Дать ₴</button>
                <button class="btn btn-blue" onclick="admAction('usd')">Дать $</button>
                <button class="btn btn-red" onclick="admBan()">ЗАБАНИТЬ</button>
            </div>
        </div>
    </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDmf-lcDM5hXBwBqzymGlzdoHdTGfT2pRg",
  authDomain: "magniybank.firebaseapp.com",
  databaseURL: "https://magniybank-default-rtdb.firebaseio.com",
  projectId: "magniybank",
  storageBucket: "magniybank.firebasestorage.app",
  messagingSenderId: "1006815080708",
  appId: "1:1006815080708:web:e9c3afd0a15d8abbe46051"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let session = localStorage.getItem('user');
let uData = null;

const toast = (m) => { const t = document.getElementById('toast'); t.innerText=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), 3000); };

// GENERATOR
function genNum() { return "4441 " + Math.floor(1000+Math.random()*8999) + " " + Math.floor(1000+Math.random()*8999) + " " + Math.floor(1000+Math.random()*8999); }
function genCvv() { return Math.floor(100+Math.random()*899); }

// AUTH
function doLogin() {
    let l = document.getElementById('l-in').value.toLowerCase().trim();
    let p = document.getElementById('p-in').value;
    db.ref('users/'+l).once('value', s => {
        let d = s.val();
        if(d && d.pass === p) {
            if(d.isBanned) return toast("ОТКАЗАНО В ДОСТУПЕ");
            localStorage.setItem('user', l); location.reload();
        } else toast("Неверные данные");
    });
}

function showReg() {
    document.getElementById('auth-ui').innerHTML = `
        <input id="rl" class="input" placeholder="Логин">
        <input id="rp" class="input" type="password" placeholder="Пароль">
        <input id="rn" class="input" placeholder="Ваше Имя">
        <input id="rt" class="input" placeholder="Токен (admin99 для админки)">
        <button class="btn btn-blue" onclick="doReg()">Зарегистрироваться</button>
        <button class="btn" style="background:none; color:#fff" onclick="location.reload()">Назад</button>
    `;
}

function doReg() {
    let l = document.getElementById('rl').value.toLowerCase().trim();
    let p = document.getElementById('rp').value;
    let n = document.getElementById('rn').value || "Клиент";
    let t = document.getElementById('rt').value;

    let mainCard = { num: genNum(), cvv: genCvv(), type: 'UAH' };

    db.ref('users/'+l).set({
        login: l, pass: p, name: n, bal: 500, usd: 0, eur: 0,
        isAdmin: (t === "admin99"),
        cards: [mainCard],
        assets: []
    }).then(() => { localStorage.setItem('user', l); location.reload(); });
}

// LOGIC
const items = {
    auto: [{n:"Lada", p:2500}, {n:"BMW M5", p:35000}, {n:"Porsche", p:95000}],
    home: [{n:"Квартира", p:20000}, {n:"Особняк", p:120000}],
    biz: [{n:"Ларек", p:45000}, {n:"Завод", p:800000}]
};

if(session) {
    db.ref('users/'+session).on('value', s => {
        uData = s.val();
        if(!uData) return;
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        
        document.getElementById('u-greet').innerText = "С возвращением, " + uData.name;
        document.getElementById('b-uah').innerText = uData.bal.toLocaleString() + " ₴";
        document.getElementById('b-usd').innerText = uData.usd.toLocaleString() + " $";
        document.getElementById('b-eur').innerText = uData.eur.toLocaleString() + " €";

        if(uData.isAdmin) document.getElementById('adm-nav').style.display = 'flex';

        // Render Cards
        let cList = document.getElementById('cards-list'); cList.innerHTML = '';
        (uData.cards || []).forEach(c => {
            cList.innerHTML += `
                <div class="bank-card ${c.type === 'USD' ? 'card-usd' : (c.type === 'EUR' ? 'card-eur' : '')}">
                    <div class="card-chip"></div>
                    <div class="card-num">${c.num}</div>
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <span>${uData.name.toUpperCase()}</span>
                        <span>04/30 | CVV: ${c.cvv} | <b>${c.type}</b></span>
                    </div>
                </div>`;
        });

        // Assets
        let aList = document.getElementById('my-assets'); aList.innerHTML = '';
        (uData.assets || []).forEach(a => aList.innerHTML += `<div class="shop-card"><b>${a}</b></div>`);
    });
}

function work() { db.ref('users/'+session+'/bal').set(uData.bal + 5); }

function issueCard(type) {
    if(uData.bal < 1000) return toast("Выпуск карты стоит 1000 ₴");
    let newCard = { num: genNum(), cvv: genCvv(), type: type };
    let cards = uData.cards || [];
    cards.push(newCard);
    db.ref('users/'+session).update({ bal: uData.bal - 1000, cards: cards });
    toast("Карта "+type+" успешно открыта!");
}

function exchange(from, to) {
    let amt = parseInt(document.getElementById('ex-amount').value);
    if(!amt || amt <= 0) return toast("Введите сумму");
    
    if(from === 'uah' && to === 'usd' && uData.bal >= amt) {
        db.ref('users/'+session).update({ bal: uData.bal - amt, usd: uData.usd + Math.floor(amt/40) });
    } else if(from === 'uah' && to === 'eur' && uData.bal >= amt) {
        db.ref('users/'+session).update({ bal: uData.bal - amt, eur: uData.eur + Math.floor(amt/45) });
    } else if(from === 'usd' && to === 'uah' && uData.usd >= amt) {
        db.ref('users/'+session).update({ usd: uData.usd - amt, bal: uData.bal + (amt*40) });
    } else if(from === 'eur' && to === 'uah' && uData.eur >= amt) {
        db.ref('users/'+session).update({ eur: uData.eur - amt, bal: uData.bal + (amt*45) });
    } else {
        return toast("Недостаточно средств");
    }
    toast("Обмен выполнен!");
}

function renderShop(cat) {
    let grid = document.getElementById('shop-grid'); grid.innerHTML = '';
    items[cat].forEach(i => {
        grid.innerHTML += `<div class="shop-card"><b>${i.n}</b><p>${i.p.toLocaleString()} $</p><button class="btn btn-blue" style="padding:5px; margin-top:10px" onclick="buy('${i.n}', ${i.p})">Купить</button></div>`;
    });
}

function buy(n, p) {
    if(uData.usd < p) return toast("Нужно больше долларов!");
    let a = uData.assets || []; a.push(n);
    db.ref('users/'+session).update({ usd: uData.usd - p, assets: a });
    toast("Успешная покупка!");
}

function sw(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    el.classList.add('active');
}

function admAction(type) {
    let l = document.getElementById('a-user').value.toLowerCase().trim();
    let v = parseInt(document.getElementById('a-val').value);
    db.ref('users/'+l+'/'+type).transaction(c => (c || 0) + v);
    toast("Выполнено!");
}

function admBan() {
    let l = document.getElementById('a-user').value.toLowerCase().trim();
    db.ref('users/'+l).update({ isBanned: true });
    toast("Игрок забанен!");
}

function exit() {
    localStorage.removeItem('user');
    location.reload();
}
</script>
</body>
</html>
