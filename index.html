<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BroBank Online</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* СТИЛИ */
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--gold2:#E8C96A;--dark:#080810;--dark2:#0E0E1A;--dark3:#161625;--surface:#1E1E30;--text:#F0F0FF;--muted:#8080A8;--green:#2ECC71;--red:#E74C3C}
body{font-family:'Sora',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(201,168,76,.1) 0%,transparent 60%),var(--dark)}
.abox{background:var(--dark2);border:1px solid rgba(201,168,76,.2);border-radius:24px;padding:40px;width:420px;max-width:94vw}
.atabs{display:flex;gap:4px;background:var(--dark3);border-radius:10px;padding:4px;margin-bottom:24px}
.atab{flex:1;padding:9px;text-align:center;border-radius:7px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);transition:all .2s}
.atab.on{background:var(--surface);color:var(--gold)}
.f{margin-bottom:14px}.f label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.f input, .sel{width:100%;background:var(--dark3);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:all .2s; margin-top: 10px}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
#app{display:none;min-height:100vh}.layout{display:flex;min-height:100vh}
.sb{width:250px;background:var(--dark2);border-right:1px solid rgba(255,255,255,.05);position:fixed;height:100vh}
.sb-user{padding:20px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:12px}
.sb-av{width:45px;height:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;background:var(--gold);color:#000}
.nav-it{padding:12px 20px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:10px}
.nav-it.on{color:var(--gold);background:rgba(201,168,76,0.1)}
.main{margin-left:250px;flex:1;padding:30px}
.page{display:none}.page.on{display:block}
.bcard{background:linear-gradient(135deg,#1a1a2e, #16213e); border-radius:16px; padding:20px; margin-bottom:15px; position:relative; cursor:pointer; border:1px solid rgba(255,255,255,0.05)}
.bcard:active{transform:scale(0.98)}
.cnum{font-family:'JetBrains Mono'; font-size:14px; letter-spacing:2px; opacity:0.6; margin-top:10px}
.cbal{font-size:22px; font-weight:800; margin-top:5px}
.copy-hint{font-size:10px; color:var(--gold); margin-top:5px}
.tx-list{background:var(--dark2); border-radius:16px; overflow:hidden}
.tx-item{padding:15px 20px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between}
.am-in{color:var(--green)}.am-out{color:var(--red)}
.toast{position:fixed; top:20px; right:20px; background:var(--surface); border:1px solid var(--gold); padding:12px 20px; border-radius:10px; transform:translateX(150%); transition:0.3s; z-index:10000}
.toast.show{transform:translateX(0)}
.adm-box{background:var(--dark2); padding:20px; border-radius:16px; border:1px solid var(--red); margin-top:20px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="auth">
  <div class="abox">
    <div style="text-align:center; margin-bottom:30px">
        <div style="font-size:40px">🏦</div>
        <h1 style="background:linear-gradient(var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">BroBank</h1>
    </div>
    <div class="atabs">
      <div class="atab on" id="t-login" onclick="switchTab('login')">Вход</div>
      <div class="atab" id="t-reg" onclick="switchTab('reg')">Регистрация</div>
    </div>
    <div id="fl">
      <div class="f"><label>Логин</label><input id="ll" type="text" placeholder="Ваш ник"/></div>
      <div class="f"><label>Пароль</label><input id="lp" type="password" placeholder="••••••••"/></div>
      <button class="btn btn-g" onclick="doLogin()">Войти</button>
    </div>
    <div id="fr" style="display:none">
      <div class="f"><label>Имя</label><input id="rn" type="text" placeholder="Имя игрока"/></div>
      <div class="f"><label>Логин</label><input id="rl" type="text" placeholder="Ник (латиница)"/></div>
      <div class="f"><label>Пароль</label><input id="rp" type="password" placeholder="Мин. 4 знака"/></div>
      <div class="f"><label>Ключ админа</label><input id="ra" type="password" placeholder="Если есть"/></div>
      <button class="btn btn-g" onclick="doRegister()">Создать аккаунт</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="layout">
    <div class="sb">
      <div class="sb-user">
        <div class="sb-av" id="sbav">??</div>
        <div>
            <div id="sbn" style="font-weight:700">User</div>
            <div id="sbb" style="font-size:12px; color:var(--green)">0 ₴</div>
        </div>
      </div>
      <div class="sb-nav">
        <div class="nav-it on" id="n-dash" onclick="go('dash')">🏠 Главная</div>
        <div class="nav-it" id="n-transfer" onclick="go('transfer')">💸 Перевод</div>
        <div class="nav-it" id="n-cards" onclick="go('cards')">➕ Новый счёт</div>
        <div class="nav-it adm" id="n-admin" style="display:none" onclick="go('admin')">👑 Админ-панель</div>
      </div>
      <div style="position:absolute; bottom:20px; width:100%; padding:0 20px">
          <button class="btn" style="background:rgba(231,76,60,0.1); color:var(--red)" onclick="location.reload()">Выйти</button>
      </div>
    </div>

    <div class="main">
      <div class="page on" id="p-dash">
        <h2 style="margin-bottom:20px">Мои карты</h2>
        <div id="cardList"></div>
        <h3 style="margin: 25px 0 15px">История операций</h3>
        <div class="tx-list" id="txList"></div>
      </div>

      <div class="page" id="p-transfer">
        <h2>Перевод по номеру карты</h2>
        <div class="adm-box" style="border-color:var(--gold); background:var(--dark3)">
            <div class="f"><label>Номер карты получателя</label><input id="t-num" type="text" placeholder="4444 0000 ..."/></div>
            <div class="f"><label>Сумма</label><input id="t-amt" type="number" placeholder="0.00"/></div>
            <button class="btn btn-g" onclick="doTransfer()">Отправить деньги</button>
        </div>
      </div>

      <div class="page" id="p-cards">
        <h2>Открыть новый счёт</h2>
        <p style="color:var(--muted); margin-bottom:20px">Выберите тип карты для открытия</p>
        <div class="bcard" style="background:linear-gradient(135deg,#000, #333)" onclick="openNewAcc('Black')">
            <div style="font-weight:700">BroBlack</div>
            <div style="font-size:12px; opacity:0.7">Повседневная карта</div>
        </div>
        <div class="bcard" style="background:linear-gradient(135deg,#C9A84C, #8A6E2F)" onclick="openNewAcc('Gold')">
            <div style="font-weight:700; color:#000">BroGold</div>
            <div style="font-size:12px; color:#000; opacity:0.7">Премиальное обслуживание</div>
        </div>
      </div>

      <div class="page" id="p-admin">
        <h2 style="color:var(--red)">Админ-центр</h2>
        <div class="adm-box">
            <div class="f"><label>Логин игрока</label><input id="a-user" type="text" placeholder="Ник игрока"/></div>
            <div class="f"><label>Сумма (со знаком минус, чтобы забрать)</label><input id="a-amt" type="number" placeholder="1000"/></div>
            <div class="f"><label>Причина</label><input id="a-note" type="text" placeholder="Бонус от сервера"/></div>
            <button class="btn" style="background:var(--red); color:#fff" onclick="adminAction()">Выполнить операцию</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
  { "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
  }}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getDatabase, ref, set, get, update, onValue, push } from "firebase/database";

const firebaseConfig = {
  apiKey: "AIzaSyDmf-lcDM5hXBwBqzymGlzdoHdTGfT2pRg",
  authDomain: "magniybank.firebaseapp.com",
  databaseURL: "https://magniybank-default-rtdb.firebaseio.com",
  projectId: "magniybank",
  storageBucket: "magniybank.firebasestorage.app",
  messagingSenderId: "1006815080708",
  appId: "1:1006815080708:web:e9c3afd0a15d8abbe46051",
  measurementId: "G-1W0FP9YX6G"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Состояние
let currentUser = null;

// Глобальные функции
window.switchTab = (t) => {
    document.getElementById('fl').style.display = t === 'login' ? '' : 'none';
    document.getElementById('fr').style.display = t === 'reg' ? '' : 'none';
    document.getElementById('t-login').className = 'atab' + (t === 'login' ? ' on' : '');
    document.getElementById('t-reg').className = 'atab' + (t === 'reg' ? ' on' : '');
};

window.go = (id) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.nav-it').forEach(n => n.classList.remove('on'));
    document.getElementById('p-' + id).classList.add('on');
    document.getElementById('n-' + id).classList.add('on');
};

const toast = (m) => {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
};

const mkCardNum = () => {
    let n = "4444";
    for(let i=0; i<3; i++) n += " " + Math.floor(1000 + Math.random() * 9000);
    return n;
};

// Копирование
window.copyNum = (num) => {
    navigator.clipboard.writeText(num.replace(/\s/g, ''));
    toast("Номер карты скопирован!");
};

// Вход
window.doLogin = async () => {
    const l = document.getElementById('ll').value.trim().toLowerCase();
    const p = document.getElementById('lp').value;
    const s = await get(ref(db, 'users/' + l));
    if(s.exists() && s.val().pass === p) {
        initApp(l);
    } else {
        toast("Неверный логин или пароль");
    }
};

// Рега
window.doRegister = async () => {
    const n = document.getElementById('rn').value.trim();
    const l = document.getElementById('rl').value.trim().toLowerCase();
    const p = document.getElementById('rp').value;
    const ak = document.getElementById('ra').value;

    if(!n || !l || p.length < 4) return toast("Заполните все данные");
    const s = await get(ref(db, 'users/' + l));
    if(s.exists()) return toast("Логин уже занят");

    const newUser = {
        name: n, login: l, pass: p,
        isAdmin: ak === "brothers2024",
        cards: [{ number: mkCardNum(), balance: 1000, type: 'Black' }]
    };

    await set(ref(db, 'users/' + l), newUser);
    await set(ref(db, 'cardIndex/' + newUser.cards[0].number.replace(/\s/g, '')), l);
    await push(ref(db, 'history/' + l), { msg: "Бонус за регистрацию", amt: 1000, type: 'in', date: Date.now() });
    
    initApp(l);
};

function initApp(uid) {
    currentUser = uid;
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    onValue(ref(db, 'users/' + uid), (s) => {
        const u = s.val();
        if(!u) return;
        document.getElementById('sbn').textContent = u.name;
        document.getElementById('sbav').textContent = u.name[0].toUpperCase();
        
        const total = u.cards.reduce((sum, c) => sum + c.balance, 0);
        document.getElementById('sbb').textContent = total.toLocaleString() + " ₴";

        const cardHtml = u.cards.map(c => `
            <div class="bcard" onclick="copyNum('${c.number}')">
                <div style="display:flex; justify-content:space-between">
                    <span style="font-size:12px; opacity:0.6">${c.type} Card</span>
                    <span style="font-size:12px">Visa</span>
                </div>
                <div class="cbal">${c.balance.toLocaleString()} ₴</div>
                <div class="cnum">${c.number}</div>
                <div class="copy-hint">Нажмите, чтобы скопировать номер</div>
            </div>
        `).join('');
        document.getElementById('cardList').innerHTML = cardHtml;

        if(u.isAdmin) document.querySelectorAll('.adm').forEach(e => e.style.display = 'flex');
    });

    onValue(ref(db, 'history/' + uid), (s) => {
        const data = s.val();
        if(!data) return;
        const items = Object.values(data).reverse();
        document.getElementById('txList').innerHTML = items.map(t => `
            <div class="tx-item">
                <div>
                    <div style="font-weight:600">${t.msg}</div>
                    <div style="font-size:10px; color:var(--muted)">${new Date(t.date).toLocaleString()}</div>
                </div>
                <div class="am-${t.type}">${t.type==='in'?'+':'-'}${t.amt} ₴</div>
            </div>
        `).join('');
    });
}

// Перевод по номеру
window.doTransfer = async () => {
    const num = document.getElementById('t-num').value.replace(/\s/g, '');
    const amt = parseFloat(document.getElementById('t-amt').value);

    if(!num || !amt || amt <= 0) return toast("Введите корректные данные");

    // Ищем владельца карты
    const idx = await get(ref(db, 'cardIndex/' + num));
    if(!idx.exists()) return toast("Карта не найдена");
    const targetUid = idx.val();

    if(targetUid === currentUser) return toast("Нельзя переводить себе");

    const senderS = await get(ref(db, 'users/' + currentUser));
    const sender = senderS.val();

    if(sender.cards[0].balance < amt) return toast("Недостаточно денег");

    // Снимаем у нас
    sender.cards[0].balance -= amt;
    await update(ref(db, 'users/' + currentUser), { cards: sender.cards });
    await push(ref(db, 'history/' + currentUser), { msg: `Перевод на карту •${num.slice(-4)}`, amt, type: 'out', date: Date.now() });

    // Добавляем им
    const targetS = await get(ref(db, 'users/' + targetUid));
    const target = targetS.val();
    target.cards[0].balance += amt;
    await update(ref(db, 'users/' + targetUid), { cards: target.cards });
    await push(ref(db, 'history/' + targetUid), { msg: `Входящий перевод от ${sender.name}`, amt, type: 'in', date: Date.now() });

    toast("Перевод выполнен!");
    document.getElementById('t-amt').value = '';
};

// Открытие счета
window.openNewAcc = async (type) => {
    const s = await get(ref(db, 'users/' + currentUser));
    const u = s.val();
    const newNum = mkCardNum();
    u.cards.push({ number: newNum, balance: 0, type: type });
    await update(ref(db, 'users/' + currentUser), { cards: u.cards });
    await set(ref(db, 'cardIndex/' + newNum.replace(/\s/g, '')), currentUser);
    toast("Новый счёт открыт!");
    go('dash');
};

// Админка
window.adminAction = async () => {
    const uid = document.getElementById('a-user').value.trim().toLowerCase();
    const amt = parseFloat(document.getElementById('a-amt').value);
    const note = document.getElementById('a-note').value || "Корректировка баланса";

    const s = await get(ref(db, 'users/' + uid));
    if(!s.exists()) return toast("Игрок не найден");

    const u = s.val();
    u.cards[0].balance += amt;
    
    await update(ref(db, 'users/' + uid), { cards: u.cards });
    await push(ref(db, 'history/' + uid), { 
        msg: note, 
        amt: Math.abs(amt), 
        type: amt > 0 ? 'in' : 'out', 
        date: Date.now() 
    });

    toast("Готово!");
};
</script>
</body>
</html>
