<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magniy OS Ultimate</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; --accent: #007AFF; --danger: #FF3B30; --text: #fff; --sec: #8E8E93; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth */
        #auth { display: flex; height: 100vh; align-items: center; justify-content: center; background: #000; padding: 20px; }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }

        /* App Layout */
        #app { display: none; height: 100vh; width: 100vw; display: flex; }
        .sidebar { width: 260px; background: #080808; border-right: 1px solid #1c1c1e; padding: 20px; display: flex; flex-direction: column; shrink: 0; }
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; background: var(--bg); }

        /* Navigation */
        .nav-link { padding: 14px; border-radius: 12px; cursor: pointer; color: var(--sec); margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
        .nav-link:hover { background: #111; color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; }

        /* Bank Card */
        .card-wrapper { perspective: 1000px; margin-bottom: 30px; }
        .bank-card { width: 100%; max-width: 320px; height: 190px; position: relative; transform-style: preserve-3d; transition: 0.6s; cursor: pointer; margin: 0 auto; }
        .bank-card.flipped { transform: rotateY(180deg); }
        .card-side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 18px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: space-between; }
        .card-f { background: linear-gradient(135deg, #2c2c2c, #000); }
        .card-b { background: #111; transform: rotateY(180deg); justify-content: center; align-items: center; }
        .card-num { font-size: 20px; letter-spacing: 2px; font-family: monospace; font-weight: 700; margin: 10px 0; }

        /* Balance & Stats */
        .bal-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .bal-card { background: var(--card); padding: 15px; border-radius: 14px; border: 1px solid #222; text-align: center; }
        .bal-card span { font-size: 10px; color: var(--sec); text-transform: uppercase; }
        .bal-card b { display: block; font-size: 16px; margin-top: 5px; }

        /* Items Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .item { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid #222; text-align: center; }

        /* Buttons & Inputs */
        .btn { background: #fff; color: #000; border: none; padding: 15px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-red { background: var(--danger); color: #fff; }
        .input { width: 100%; background: #151515; border: 1px solid #222; padding: 15px; border-radius: 14px; color: #fff; margin-bottom: 10px; outline: none; }

        .page { display: none; } .page.active { display: block; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 12px 25px; border-radius: 30px; z-index: 10000; transition: 0.4s; font-weight: 700; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #toast.on { transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) { .sidebar { display: none; } .mobile-nav { display: grid; position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; grid-template-columns: repeat(6, 1fr); border-top: 1px solid #222; } }
        .mobile-nav { display: none; } .m-item { display: flex; align-items: center; justify-content: center; color: var(--sec); font-size: 20px; }
    </style>
</head>
<body>

<div id="toast">Уведомление</div>

<div id="auth">
    <div class="auth-box">
        <h1 style="font-weight:900; margin-bottom:30px; font-size:36px;">MAGNIY OS</h1>
        <div id="auth-ui">
            <input id="l-in" class="input" placeholder="Логин">
            <input id="p-in" class="input" type="password" placeholder="Пароль">
            <button class="btn btn-blue" onclick="doLogin()">Войти</button>
            <button class="btn" style="background:none; color:var(--sec)" onclick="showReg()">Создать аккаунт</button>
        </div>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <h2 style="margin-bottom:20px; color:var(--accent)">Magniy</h2>
        <div class="nav-link active" onclick="sw('dash', this)">🏠 Главная</div>
        <div class="nav-link" onclick="sw('shop', this)">🛍️ Магазины</div>
        <div class="nav-link" onclick="sw('market', this)">⚖️ Торговля</div>
        <div class="nav-link" onclick="sw('chat', this)">💬 Сообщения</div>
        <div class="nav-link" onclick="sw('game', this)">♠️ Казино 21</div>
        <div id="adm-nav" class="nav-link" style="display:none; color:var(--danger); border:1px solid var(--danger)" onclick="sw('adm', this)">🛠️ АДМИНКА</div>
        <button class="btn btn-red" style="margin-top:auto" onclick="exit()">🚪 ВЫЙТИ</button>
    </div>

    <div class="main">
        <div id="p-dash" class="page active">
            <h2 id="u-name">Загрузка...</h2><br>
            
            <div class="card-wrapper">
                <div class="bank-card" id="main-card" onclick="this.classList.toggle('flipped')">
                    <div class="card-side card-f">
                        <div style="width:45px; height:32px; background:linear-gradient(135deg, gold, #b8860b); border-radius:6px;"></div>
                        <div class="card-num" id="c-num">0000 0000 0000 0000</div>
                        <div style="display:flex; justify-content:space-between; font-size:12px; opacity:0.7">
                            <span id="c-owner">NAME SURNAME</span>
                            <span id="c-date">04/30</span>
                        </div>
                    </div>
                    <div class="card-side card-b">
                        <p style="font-size:10px; margin-bottom:5px; opacity:0.5">CVV CODE</p>
                        <div style="background:#fff; color:#000; padding:5px 15px; font-weight:900; border-radius:4px;" id="c-cvv">000</div>
                    </div>
                </div>
            </div>

            <div class="bal-row">
                <div class="bal-card"><span>Гривны</span><b id="b-uah">0 ₴</b></div>
                <div class="bal-card"><span>Доллары</span><b id="b-usd">0 $</b></div>
                <div class="bal-card"><span>Евро</span><b id="b-eur">0 €</b></div>
            </div>

            <button class="btn btn-blue" onclick="work()">💰 Кликнуть (+5 ₴)</button>

            <h3 style="margin:20px 0 10px;">Моё имущество</h3>
            <div id="assets" class="grid"></div>
        </div>

        <div id="p-shop" class="page">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn" onclick="loadShop('auto')">🏎️ Авто</button>
                <button class="btn" onclick="loadShop('home')">🏠 Дома</button>
                <button class="btn" onclick="loadShop('biz')">💼 Бизнес</button>
            </div>
            <div id="shop-grid" class="grid"></div>
        </div>

        <div id="p-chat" class="page">
            <h2>Личные сообщения</h2><br>
            <div id="chat-box" style="height:350px; background:#080808; border-radius:15px; border:1px solid #222; padding:20px; overflow-y:auto; margin-bottom:10px;"></div>
            <div style="display:flex; gap:10px">
                <input id="chat-to" class="input" style="width:120px" placeholder="Логин">
                <input id="chat-msg" class="input" placeholder="Сообщение...">
                <button class="btn btn-blue" style="width:80px" onclick="sendPriv()">🕊️</button>
            </div>
        </div>

        <div id="p-adm" class="page">
            <h2>Админ-панель</h2><br>
            <input id="a-user" class="input" placeholder="Логин игрока">
            <input id="a-val" class="input" type="number" placeholder="Сумма">
            <div style="display:flex; gap:10px">
                <button class="btn btn-blue" onclick="admGift('usd')">Дать $</button>
                <button class="btn btn-red" onclick="admBan()">ЗАБАНИТЬ</button>
            </div>
        </div>
    </div>
</div>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDmf-lcDM5hXBwBqzymGlzdoHdTGfT2pRg",
  authDomain: "magniybank.firebaseapp.com",
  databaseURL: "https://magniybank-default-rtdb.firebaseio.com",
  projectId: "magniybank",
  storageBucket: "magniybank.firebasestorage.app",
  messagingSenderId: "1006815080708",
  appId: "1:1006815080708:web:e9c3afd0a15d8abbe46051"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let cur = localStorage.getItem('user');
let uData = null;

const toast = (m) => { const t = document.getElementById('toast'); t.innerText=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), 3000); };

// AUTH
function doLogin() {
    let l = document.getElementById('l-in').value.toLowerCase().trim();
    let p = document.getElementById('p-in').value;
    db.ref('users/'+l).once('value', s => {
        let d = s.val();
        if(d && d.pass === p) {
            if(d.isBanned) return toast("ВЫ ЗАБАНЕНЫ");
            localStorage.setItem('user', l); location.reload();
        } else toast("Ошибка!");
    });
}

function showReg() {
    document.getElementById('auth-ui').innerHTML = `
        <input id="rl" class="input" placeholder="Логин">
        <input id="rp" class="input" type="password" placeholder="Пароль">
        <input id="rn" class="input" placeholder="Имя на карту">
        <input id="rt" class="input" placeholder="Токен (admin99)">
        <button class="btn btn-blue" onclick="doReg()">Создать</button>
        <button class="btn" style="background:none; color:#fff" onclick="location.reload()">Назад</button>
    `;
}

function doReg() {
    let l = document.getElementById('rl').value.toLowerCase().trim();
    let p = document.getElementById('rp').value;
    let n = document.getElementById('rn').value || "USER";
    let t = document.getElementById('rt').value;
    
    // ГЕНЕРАЦИЯ КАРТЫ
    let c1 = Math.floor(1000+Math.random()*8999);
    let c2 = Math.floor(1000+Math.random()*8999);
    let c3 = Math.floor(1000+Math.random()*8999);
    let cFull = "4441 " + c1 + " " + c2 + " " + c3;
    let cvv = Math.floor(100+Math.random()*899);

    db.ref('users/'+l).set({
        login: l, pass: p, name: n, bal: 1000, usd: 0, eur: 0,
        cardN: cFull, cardC: cvv, cardD: "04/30",
        isAdmin: (t === "admin99"), assets: []
    }).then(() => { localStorage.setItem('user', l); location.reload(); });
}

// MAIN
const shops = {
    auto: [{n:"Lada", p:2000}, {n:"BMW M5", p:25000}, {n:"Lamborghini", p:150000}],
    home: [{n:"Квартира", p:15000}, {n:"Дом", p:60000}, {n:"Вилла", p:300000}],
    biz: [{n:"Ларек", p:50000}, {n:"Кафе", p:120000}, {n:"Завод", p:1000000}]
};

if(cur) {
    db.ref('users/'+cur).on('value', s => {
        uData = s.val();
        if(!uData) return;
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        
        document.getElementById('u-name').innerText = "Привет, " + uData.name;
        document.getElementById('b-uah').innerText = uData.bal.toLocaleString() + " ₴";
        document.getElementById('b-usd').innerText = (uData.usd || 0).toLocaleString() + " $";
        document.getElementById('b-eur').innerText = (uData.eur || 0).toLocaleString() + " €";
        
        document.getElementById('c-num').innerText = uData.cardN || "НЕ ГЕНЕРИРОВАНО";
        document.getElementById('c-owner').innerText = uData.name.toUpperCase();
        document.getElementById('c-cvv').innerText = uData.cardC || "000";

        if(uData.isAdmin) document.getElementById('adm-nav').style.display = 'flex';

        let aDiv = document.getElementById('assets'); aDiv.innerHTML = '';
        (uData.assets || []).forEach(a => aDiv.innerHTML += `<div class="item"><b>${a}</b></div>`);
    });
}

function work() { db.ref('users/'+cur+'/bal').set(uData.bal + 5); }

function loadShop(type) {
    let grid = document.getElementById('shop-grid'); grid.innerHTML = '';
    shops[type].forEach(i => {
        grid.innerHTML += `<div class="item"><b>${i.n}</b><p>${i.p} $</p><button class="btn btn-blue" style="padding:5px; margin-top:10px" onclick="buy('${i.n}', ${i.p})">Купить</button></div>`;
    });
}

function buy(n, p) {
    if(uData.usd < p) return toast("Мало $");
    let a = uData.assets || []; a.push(n);
    db.ref('users/'+cur).update({ usd: uData.usd - p, assets: a });
    toast("Куплено!");
}

function sw(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    if(el) el.classList.add('active');
}

function admGift(t) {
    let l = document.getElementById('a-user').value.toLowerCase().trim();
    let v = parseInt(document.getElementById('a-val').value);
    db.ref('users/'+l+'/'+t).transaction(c => (c||0) + v);
    toast("Выдано!");
}

function exit() { localStorage.clear(); location.reload(); }
</script>
</body>
    </html>
