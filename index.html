<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magniy OS v9 OMEGA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #007AFF; --text: #fff; --sec: #888; --gold: #FFD700; --green: #34C759; --red: #FF3B30; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Layout */
        .header { height: 60px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #222; }
        .nav { display: flex; background: #080808; overflow-x: auto; border-bottom: 1px solid #222; scrollbar-width: none; }
        .nav-btn { padding: 15px 20px; cursor: pointer; color: var(--sec); white-space: nowrap; font-weight: 600; font-size: 13px; }
        .nav-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        .main { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        
        /* Cards */
        .card { background: var(--panel); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .stat-box { background: #1a1a1a; padding: 12px; border-radius: 12px; text-align: center; }
        .stat-box span { font-size: 10px; color: var(--sec); display: block; }
        .stat-box b { font-size: 16px; color: var(--green); }

        /* Buttons & Inputs */
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; transition: 0.2s; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-gold { background: var(--gold); color: #000; }
        .input { width: 100%; background: #222; border: 1px solid #333; padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 8px; outline: none; }

        /* Disco Effect */
        @keyframes disco { 0% { background: #500; } 50% { background: #050; } 100% { background: #005; } }
        .disco-on { animation: disco 0.3s infinite linear !important; }

        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .page { display: none; } .page.active { display: block; }
        .notif-dot { width: 8px; height: 8px; background: red; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="width: 100%; max-width: 320px; text-align: center;">
        <h1 style="font-size: 35px; margin-bottom: 25px;">MAGNIY <span style="color:var(--accent)">OS</span></h1>
        <input id="l-in" class="input" placeholder="Логин">
        <input id="p-in" class="input" type="password" placeholder="Пароль">
        <button class="btn btn-blue" onclick="auth()">ВОЙТИ / СОЗДАТЬ</button>
        <div id="saved-accs" style="margin-top: 20px;"></div>
    </div>
</div>

<div class="header">
    <b style="font-size: 20px;">Magniy <span id="u-status" style="font-size: 10px; color: var(--accent);">USER</span></b>
    <div id="notif-bell" onclick="showPage('notifs')" style="cursor:pointer">🔔 <span id="n-count"></span></div>
</div>

<div class="nav">
    <div class="nav-btn active" onclick="sw('dash', this)">Главная</div>
    <div class="nav-btn" onclick="sw('bank', this)">Банк</div>
    <div class="nav-btn" onclick="sw('crypto', this)">Биржа</div>
    <div class="nav-btn" onclick="sw('market', this)">Рынок</div>
    <div class="nav-btn" onclick="sw('casino', this)">Казино</div>
    <div class="nav-btn" onclick="sw('biz', this)">Бизнес</div>
    <div id="adm-link" class="nav-btn" style="color:red; display:none;" onclick="sw('adm', this)">АДМИН</div>
</div>

<div class="main" id="main-area">
    
    <div id="p-dash" class="page active">
        <div class="grid">
            <div class="stat-box"><span>Гривны</span><b id="w-uah">0</b></div>
            <div class="stat-box"><span>Доллары</span><b id="w-usd" style="color:var(--accent)">0</b></div>
            <div class="stat-box"><span>Евро</span><b id="w-eur" style="color:#fff">0</b></div>
        </div>
        <br>
        <div class="card" onclick="clickMoney()" style="text-align:center; padding: 40px; border: 2px dashed var(--accent); cursor:pointer;">
            <h1 style="font-size: 40px;">💰</h1>
            <p>КЛИКНИ И ЗАРАБОТАЙ 10 ₴</p>
        </div>
    </div>

    <div id="p-bank" class="page">
        <div class="card">
            <h3>Обмен валют</h3><br>
            <input id="ex-sum" class="input" type="number" placeholder="Сумма в ₴">
            <button class="btn btn-blue" onclick="exchange('usd')">Купить Доллары (1$ = 40₴)</button>
            <button class="btn btn-blue" onclick="exchange('eur')">Купить Евро (1€ = 45₴)</button>
        </div>
    </div>

    <div id="p-crypto" class="page">
        <div class="card">
            <h2 style="color:var(--gold)">Bitcoin (BTC)</h2>
            <h1 id="btc-price">$ 0</h1>
            <p>В кошельке: <b id="u-btc">0</b> BTC</p>
            <button class="btn btn-gold" onclick="tradeCrypto('buy')">Купить 1 BTC (за $)</button>
            <button class="btn" onclick="tradeCrypto('sell')">Продать всё (в $)</button>
        </div>
    </div>

    <div id="p-market" class="page">
        <h3>Торговая площадка</h3><br>
        <div class="card">
            <input id="m-item" class="input" placeholder="Название товара">
            <input id="m-price" class="input" type="number" placeholder="Цена в ₴">
            <button class="btn btn-blue" onclick="listMarket()">Выставить на продажу</button>
        </div>
        <div id="market-list"></div>
    </div>

    <div id="p-casino" class="page">
        <div class="card" style="text-align:center">
            <h2>КАЗИНО 21</h2><br>
            <p>Ваши очки: <b id="c-pts">0</b></p>
            <input id="c-bet" class="input" type="number" placeholder="Ставка ₴">
            <div style="display:flex; gap:5px;">
                <button class="btn btn-blue" onclick="cStart()">Играть</button>
                <button class="btn btn-gold" onclick="cHit()">Еще</button>
                <button class="btn" onclick="cStand()">Стоп</button>
            </div>
        </div>
    </div>

    <div id="p-biz" class="page">
        <div id="biz-shop" class="grid"></div>
        <br><h3>Моя империя:</h3>
        <div id="my-biz"></div>
    </div>

    <div id="p-notifs" class="page">
        <h3>Центр уведомлений</h3><br>
        <div id="n-list"></div>
    </div>

    <div id="p-adm" class="page">
        <div class="card">
            <h3>Управление</h3><br>
            <input id="a-user" class="input" placeholder="Логин">
            <input id="a-val" class="input" type="number" placeholder="Сумма">
            <button class="btn btn-blue" onclick="adm('give')">Дать денег</button>
            <button class="btn" style="background:red" onclick="adm('fine')">Штраф</button>
            <button class="btn btn-gold" onclick="adm('promo')">Предложить Админку</button>
            <button class="btn" style="background:purple" onclick="db.ref('global/disco').set(true)">Включить ДИСКОТЕКУ</button>
            <button class="btn" style="background:#333" onclick="db.ref('global/disco').set(false)">Выключить</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDmf-lcDM5hXBwBqzymGlzdoHdTGfT2pRg",
  authDomain: "magniybank.firebaseapp.com",
  databaseURL: "https://magniybank-default-rtdb.firebaseio.com",
  projectId: "magniybank",
  storageBucket: "magniybank.firebasestorage.app",
  messagingSenderId: "1006815080708",
  appId: "1:1006815080708:web:e9c3afd0a15d8abbe46051"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let session = localStorage.getItem('mag_omega');
let uData = null;
let btcPrice = 64000;

function auth() {
    let l = document.getElementById('l-in').value.toLowerCase().trim();
    let p = document.getElementById('p-in').value;
    if(!l || !p) return;
    db.ref('users/'+l).once('value', s => {
        if(s.exists() && s.val().pass !== p) return alert("Ошибка");
        if(!s.exists()) db.ref('users/'+l).set({login:l, pass:p, bal:1000, usd:0, eur:0, btc:0, biz:[], name:l});
        localStorage.setItem('mag_omega', l);
        location.reload();
    });
}

if(session) {
    db.ref('users/'+session).on('value', s => {
        uData = s.val();
        if(!uData) return;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('w-uah').innerText = (uData.bal||0).toLocaleString() + " ₴";
        document.getElementById('w-usd').innerText = (uData.usd||0).toLocaleString() + " $";
        document.getElementById('w-eur').innerText = (uData.eur||0).toLocaleString() + " €";
        document.getElementById('u-btc').innerText = (uData.btc||0);
        
        if(uData.isAdmin) {
            document.getElementById('adm-link').style.display = 'block';
            document.getElementById('u-status').innerText = "ADMIN";
        }

        // Рендер маркета
        db.ref('market').on('value', ms => {
            let ml = document.getElementById('market-list'); ml.innerHTML = '';
            ms.forEach(item => {
                let d = item.val();
                ml.innerHTML += `<div class="card"><b>${d.name}</b> - ${d.price}₴ <button class="btn btn-blue" onclick="buyMarket('${item.key}', ${d.price})">Купить</button></div>`;
            });
        });

        // Уведомления
        let nl = document.getElementById('n-list'); nl.innerHTML = '';
        if(uData.notifs) {
            Object.keys(uData.notifs).forEach(k => {
                let n = uData.notifs[k];
                nl.innerHTML += `<div class="card">${n} <button class="btn" onclick="delN('${k}')">Ок</button></div>`;
            });
        }
    });

    // Дискотека
    db.ref('global/disco').on('value', s => {
        if(s.val()) document.getElementById('main-area').classList.add('disco-on');
        else document.getElementById('main-area').classList.remove('disco-on');
    });
}

function clickMoney() { db.ref('users/'+session+'/bal').transaction(c => (c||0) + 10); }

function exchange(to) {
    let sum = parseInt(document.getElementById('ex-sum').value);
    if(!sum || uData.bal < sum) return alert("Мало ₴");
    let rate = (to === 'usd' ? 40 : 45);
    db.ref('users/'+session).update({ bal: uData.bal - sum, [to]: (uData[to]||0) + Math.floor(sum/rate) });
}

function tradeCrypto(type) {
    if(type === 'buy') {
        if(uData.usd < btcPrice) return alert("Нужно $" + btcPrice);
        db.ref('users/'+session).update({ usd: uData.usd - btcPrice, btc: (uData.btc||0) + 1 });
    } else {
        if(!uData.btc) return;
        db.ref('users/'+session).update({ usd: uData.usd + (uData.btc * btcPrice), btc: 0 });
    }
}

function listMarket() {
    let n = document.getElementById('m-item').value;
    let p = document.getElementById('m-price').value;
    if(n && p) db.ref('market').push({ name: n, price: parseInt(p), owner: session });
}

function buyMarket(id, pr) {
    if(uData.bal < pr) return alert("Мало ₴");
    db.ref('users/'+session+'/bal').transaction(c => c - pr);
    db.ref('market/'+id).remove();
    alert("Куплено!");
}

let pts = 0;
function cStart() { pts = Math.floor(Math.random()*10)+2; document.getElementById('c-pts').innerText = pts; }
function cHit() { 
    pts += Math.floor(Math.random()*10)+2; 
    document.getElementById('c-pts').innerText = pts;
    if(pts > 21) { alert("Перебор!"); pts = 0; }
}
function cStand() {
    let bet = parseInt(document.getElementById('c-bet').value);
    if(pts > 17) { db.ref('users/'+session+'/bal').transaction(c => c + bet); alert("Win!"); }
    else { db.ref('users/'+session+'/bal').transaction(c => c - bet); alert("Loss"); }
    pts = 0;
}

function adm(type) {
    let t = document.getElementById('a-user').value.toLowerCase();
    let v = parseInt(document.getElementById('a-val').value);
    if(type === 'give') db.ref('users/'+t+'/bal').transaction(c => (c||0) + v);
    if(type === 'fine') {
        db.ref('users/'+t+'/bal').transaction(c => (c||0) - v);
        db.ref('users/'+t+'/notifs').push("🛑 ШТРАФ: -" + v + "₴");
    }
    if(type === 'promo') db.ref('users/'+t).update({isAdmin: true});
}

function sw(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    el.classList.add('active');
}

setInterval(() => {
    btcPrice += Math.floor(Math.random()*200) - 100;
    if(document.getElementById('btc-price')) document.getElementById('btc-price').innerText = "$ " + btcPrice.toLocaleString();
}, 4000);

function delN(k) { db.ref('users/'+session+'/notifs/'+k).remove(); }
</script>
</body>
</html>
